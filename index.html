<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>12/9 Eternal Symphony - Dual Subtitle Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400&family=Playfair+Display:italic@1&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcf7d;
            --pink: #ff85a2;
            --dark: #030306;
            --sub-white: rgba(255, 255, 255, 0.85);
        }

        body {
            margin: 0;
            background: var(--dark);
            color: #fff;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            user-select: none;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            filter: contrast(110%) brightness(105%);
        }

        #ui-layer {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        .member-name {
            position: absolute;
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold);
            transform: translate(-50%, 0);
            opacity: 0;
            text-shadow: 0 0 15px rgba(255, 207, 125, 0.6);
            white-space: nowrap;
            transition: opacity 1.5s ease, transform 1s ease;
        }

        /* Dual Subtitle System */
        #subtitle-system {
            position: fixed;
            bottom: 70px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 50px;
            box-sizing: border-box;
            z-index: 20;
        }

        .sub-part {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(14px, 1.5vw, 18px);
            color: var(--sub-white);
            width: 40%;
            opacity: 0;
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        #sub-left { text-align: right; transform: translateX(-20px); }
        #sub-right { text-align: left; transform: translateX(20px); color: var(--gold); }

        #center-piece {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .date-title {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: clamp(80px, 15vw, 150px);
            background: linear-gradient(to bottom, #fff, var(--gold), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            filter: blur(25px);
            margin: 0;
            animation: breatheTitle 10s infinite 3s;
        }

        .subtitle-final {
            letter-spacing: 18px;
            font-size: clamp(8px, 1.2vw, 12px);
            color: var(--pink);
            opacity: 0;
            margin-top: -15px;
            text-shadow: 0 0 10px var(--pink);
        }

        #hint {
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 8px;
            letter-spacing: 6px;
            opacity: 0.4;
            color: var(--gold);
        }

        @keyframes breatheTitle {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px var(--gold)); }
            50% { transform: scale(1.03); filter: drop-shadow(0 0 40px var(--pink)); }
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui-layer">
    <div id="labels-container"></div>
    
    <div id="subtitle-system">
        <div id="sub-left" class="sub-part"></div>
        <div id="sub-right" class="sub-part"></div>
    </div>

    <div id="center-piece">
        <h1 id="final-date" class="date-title">12/9</h1>
        <p id="final-sub" class="subtitle-final">ALWAYS TOGETHER</p>
    </div>
</div>

<div id="hint">CHẠM ĐỂ KHỞI TẠO GIAI ĐIỆU ÁNH SÁNG</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const labelsContainer = document.getElementById('labels-container');
const subLeft = document.getElementById('sub-left');
const subRight = document.getElementById('sub-right');

let width, height, centerX, centerY;
let particles = [];
let flowers = [];
let caustics = [];
let frame = 0;
let mouse = { x: -1000, y: -1000 };

// 17 Thành viên và Lời chúc (đã được tối ưu để ngắt đôi)
const data = [
    { name: "Huyền My", wish: "Nụ cười rạng rỡ | Như đóa hướng dương đón nắng" },
    { name: "Linh Đan", wish: "Giữ sự dịu dàng | Và tâm hồn an yên giữa đời" },
    { name: "Minh Tú", wish: "Tỏa sáng riêng biệt | Vì bạn là phiên bản duy nhất" },
    { name: "Thanh Trúc", wish: "Mỗi ngày trôi qua | Đều là bản nhạc đầy cảm hứng" },
    { name: "Phương Nghi", wish: "Điều tốt đẹp nhất | Sẽ tìm đến cô gái kiên cường" },
    { name: "Gia Hân", wish: "Hạnh phúc đong đầy | Thành công trên lối bạn chọn" },
    { name: "Tuệ Lâm", wish: "Thông tuệ bản lĩnh | Nguồn năng lượng cho mọi người" },
    { name: "Quỳnh Chi", wish: "Xinh đẹp rạng ngời | Tỏa hương ngát như hoa Quỳnh" },
    { name: "Bảo Ngọc", wish: "Viên ngọc quý giá | Hãy luôn tự tin trân trọng mình" },
    { name: "Ánh Dương", wish: "Mang theo hơi ấm | Đến mọi nơi bạn đi qua" },
    { name: "Khả Ái", wish: "Thế giới dịu dàng | Với cô gái đáng yêu như bạn" },
    { name: "Mai Anh", wish: "Thanh xuân rực rỡ | Không hối tiếc những đam mê" },
    { name: "Ngọc Diệp", wish: "Lá ngọc cành vàng | Thanh cao và tràn đầy sức sống" },
    { name: "Thảo Vy", wish: "Giấc mơ của bạn | Sẽ sớm trở thành hiện thực" },
    { name: "Yến Nhi", wish: "Chú chim nhỏ tự do | Sải cánh giữa bầu trời riêng" },
    { name: "Tố Uyên", wish: "Tìm thấy niềm vui | Trong từng điều nhỏ nhất" },
    { name: "Diễm Quỳnh", wish: "Vẻ đẹp tâm hồn | Tỏa sáng từ trái tim ấm áp" }
];

function init() {
    width = window.innerWidth;
    height = window.innerHeight;
    centerX = width / 2;
    centerY = height / 2;
    canvas.width = width;
    canvas.height = height;

    caustics = [];
    for(let i=0; i<5; i++) {
        caustics.push({
            x: Math.random() * width,
            y: Math.random() * height,
            r: 200 + Math.random() * 300,
            vx: (Math.random() - 0.5) * 0.15,
            vy: (Math.random() - 0.5) * 0.15,
            opacity: 0.015 + Math.random() * 0.02 // Đã giảm độ sáng sân khấu
        });
    }
}

window.addEventListener('resize', init);
init();

class Particle {
    constructor(x, y, isSpecial = false) {
        this.isSpecial = isSpecial;
        this.reset(x, y, isSpecial);
    }
    reset(x, y, isSpecial) {
        this.x = x || Math.random() * width;
        this.y = y || Math.random() * height;
        this.vx = (Math.random() - 0.5) * 0.8;
        this.vy = (Math.random() - 0.5) * 0.8;
        this.life = 1;
        this.decay = Math.random() * 0.005 + 0.003;
        this.size = isSpecial ? Math.random() * 2.5 + 1.2 : Math.random() * 1.2;
        this.color = isSpecial ? '#ffcf7d' : (Math.random() > 0.6 ? '#ff85a2' : '#fff');
    }
    update() {
        let dx = this.x - mouse.x;
        let dy = this.y - mouse.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 130 && mouse.x > 0) {
            let force = (130 - dist) / 130;
            let angle = Math.atan2(dy, dx);
            this.vx += Math.cos(angle) * force * 0.06;
            this.vy += Math.sin(angle) * force * 0.06;
        }
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.99;
        this.vy *= 0.99;
        this.life -= this.decay;
        if (this.life <= 0) {
            if (this.isSpecial) particles.splice(particles.indexOf(this), 1);
            else this.reset();
        }
    }
    draw() {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

class EtherealFlower {
    constructor(index, person) {
        this.index = index;
        this.name = person.name;
        const radius = Math.min(width, height) * 0.35;
        const angle = (index / 17) * Math.PI * 2 - Math.PI/2;
        this.x = centerX + Math.cos(angle) * radius;
        this.y = centerY + Math.sin(angle) * radius;
        this.size = 0;
        this.maxSize = 42 + Math.random() * 15;
        this.hue = 330 + (index * 4);
        this.petals = 7 + Math.floor(Math.random() * 3);
        this.points = [];
        this.wobblePhase = Math.random() * Math.PI * 2;
        this.initFlower();
        this.createLabel();
    }
    initFlower() {
        for (let i = 0; i < this.petals; i++) {
            this.points.push({ rot: (i / this.petals) * Math.PI * 2, len: 1.2 + Math.random() * 0.3, curve: 0.6 + Math.random() * 0.3 });
        }
    }
    createLabel() {
        const label = document.createElement('div');
        label.className = 'member-name';
        label.innerText = this.name;
        label.style.left = `${this.x}px`;
        label.style.top = `${this.y + 65}px`;
        labelsContainer.appendChild(label);
        this.uiLabel = label;
    }
    draw() {
        if (this.size < 0.1) return;
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(frame * 0.005 + Math.sin(frame * 0.02 + this.wobblePhase) * 0.05);
        this.points.forEach(p => {
            ctx.save();
            ctx.rotate(p.rot);
            const grad = ctx.createLinearGradient(0, 0, 0, this.size * p.len);
            grad.addColorStop(0, `hsla(${this.hue}, 100%, 88%, 0.85)`);
            grad.addColorStop(1, `hsla(${this.hue + 20}, 60%, 40%, 0)`);
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(this.size * p.curve, this.size * 0.5, this.size * 0.5, this.size * p.len, 0, this.size * p.len);
            ctx.bezierCurveTo(-this.size * 0.5, this.size * p.len, -this.size * p.curve, this.size * 0.5, 0, 0);
            ctx.fill();
            ctx.restore();
        });
        ctx.beginPath();
        ctx.arc(0, 0, this.size/5, 0, Math.PI * 2);
        ctx.fillStyle = "#fff";
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#fff";
        ctx.fill();
        ctx.restore();
    }
    update() {
        if (this.size < this.maxSize) {
            this.size += (this.maxSize - this.size) * 0.07;
            if (this.size > this.maxSize * 0.7) {
                this.uiLabel.style.opacity = 1;
                this.uiLabel.style.transform = 'translate(-50%, -5px)';
            }
        }
    }
}

for (let i = 0; i < 140; i++) particles.push(new Particle());
const varColors = { gold: '#ffcf7d', pink: '#ff85a2' };

window.addEventListener('mousedown', (e) => {
    if (flowers.length < 17) {
        const currentData = data[flowers.length];
        flowers.push(new EtherealFlower(flowers.length, currentData));
        updateSubtitle(currentData.wish);
        for(let i=0; i<20; i++) particles.push(new Particle(e.clientX, e.clientY, true));
        document.getElementById('hint').style.opacity = 0;
    } else if (flowers.length === 17) {
        showFinalDate();
        flowers.push({ isDummy: true });
    }
});

function updateSubtitle(wishText) {
    const parts = wishText.split('|');
    subLeft.style.opacity = 0;
    subRight.style.opacity = 0;
    subLeft.style.transform = 'translateX(-30px)';
    subRight.style.transform = 'translateX(30px)';
    
    setTimeout(() => {
        subLeft.innerText = parts[0].trim();
        subRight.innerText = parts[1] ? parts[1].trim() : "";
        subLeft.style.opacity = 1;
        subRight.style.opacity = 1;
        subLeft.style.transform = 'translateX(0)';
        subRight.style.transform = 'translateX(0)';
    }, 400);
}

function showFinalDate() {
    subLeft.style.opacity = 0;
    subRight.style.opacity = 0;
    const fd = document.getElementById('final-date');
    const fs = document.getElementById('final-sub');
    fd.style.transition = "all 5s cubic-bezier(0.19, 1, 0.22, 1)";
    fd.style.opacity = 1;
    fd.style.filter = "blur(0px)";
    setTimeout(() => { fs.style.opacity = 0.7; fs.style.transition = "opacity 2.5s ease"; }, 2500);
    particles.forEach(p => { p.vx = (centerX - p.x) * 0.04; p.vy = (centerY - p.y) * 0.04; });
}

window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });

function animate() {
    frame++;
    ctx.globalAlpha = 1;
    ctx.fillStyle = 'rgba(3, 3, 6, 0.22)';
    ctx.fillRect(0, 0, width, height);

    ctx.globalCompositeOperation = 'lighter';
    caustics.forEach(c => {
        c.x += c.vx; c.y += c.vy;
        if(c.x < 0 || c.x > width) c.vx *= -1;
        if(c.y < 0 || c.y > height) c.vy *= -1;
        ctx.globalAlpha = c.opacity;
        let grad = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, c.r);
        grad.addColorStop(0, '#fff'); grad.addColorStop(0.3, varColors.gold); grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalCompositeOperation = 'source-over';

    particles.forEach(p => { p.update(); p.draw(); });
    flowers.forEach(f => { if (!f.isDummy) { f.update(); f.draw(); } });
    requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
