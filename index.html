<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>12/9 Eternal Bloom - Ethereal Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Montserrat:wght@200;400&family=Playfair+Display:italic@1&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcf7d;
            --pink: #ff85a2;
            --dark: #050508;
        }

        body {
            margin: 0;
            background: var(--dark);
            color: #fff;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            user-select: none;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* UI Layers */
        #ui-layer {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        /* Tên thành viên dưới mỗi bông hoa */
        .member-name {
            position: absolute;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold);
            transform: translate(-50%, 0);
            opacity: 0;
            text-shadow: 0 0 10px rgba(255, 207, 125, 0.4);
            white-space: nowrap;
        }

        /* Phụ đề lời chúc phía dưới */
        #subtitle-container {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            text-align: center;
            z-index: 20;
        }

        #wish-subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.6;
            opacity: 0;
            transform: translateY(20px);
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* Finale Elements */
        #center-piece {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .date-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(60px, 10vw, 120px);
            background: linear-gradient(to bottom, #fff 30%, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            filter: blur(20px);
            margin: 0;
        }

        .subtitle-final {
            letter-spacing: 15px;
            font-size: 10px;
            color: var(--pink);
            opacity: 0;
            margin-top: -10px;
        }

        #hint {
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 8px;
            letter-spacing: 5px;
            opacity: 0.4;
            color: var(--gold);
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui-layer">
    <div id="labels-container"></div>
    
    <div id="subtitle-container">
        <div id="wish-subtitle"></div>
    </div>

    <div id="center-piece">
        <h1 id="final-date" class="date-title">12/9</h1>
        <p id="final-sub" class="subtitle-final">ALWAYS TOGETHER</p>
    </div>
</div>

<div id="hint">CHẠM NHẸ ĐỂ KHỞI ĐẦU PHÉP MÀU</div>

<script>
/**
 * THE 12/9 SYMPHONY - UPDATED SUBTITLE VERSION
 */

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const labelsContainer = document.getElementById('labels-container');
const wishSubtitle = document.getElementById('wish-subtitle');

let width, height, centerX, centerY;
let particles = [];
let flowers = [];
let frame = 0;
let mouse = { x: -1000, y: -1000 };

const data = [
    { name: "Huyền My", wish: "Mong nụ cười của bạn luôn rạng rỡ như đóa hướng dương đón nắng." },
    { name: "Linh Đan", wish: "Chúc bạn luôn giữ được sự dịu dàng và tâm hồn an yên giữa cuộc sống." },
    { name: "Minh Tú", wish: "Hãy tỏa sáng theo cách riêng của bạn, vì bạn là phiên bản duy nhất." },
    { name: "Thanh Trúc", wish: "Chúc bạn mỗi ngày đều là một bản nhạc ngọt ngào và đầy cảm hứng." },
    { name: "Phương Nghi", wish: "Mong những điều tốt đẹp nhất sẽ luôn tìm đến với cô gái kiên cường." },
    { name: "Gia Hân", wish: "Chúc bạn luôn hạnh phúc và gặt hái được nhiều thành công trên con đường đã chọn." },
    { name: "Tuệ Lâm", wish: "Sự thông tuệ và bản lĩnh của bạn luôn là nguồn năng lượng tích cực cho mọi người." },
    { name: "Quỳnh Chi", wish: "Chúc bạn mãi xinh đẹp và tỏa hương thơm ngát như loài hoa Quỳnh." },
    { name: "Bảo Ngọc", wish: "Bạn là viên ngọc quý, hãy luôn tự tin và trân trọng bản thân mình nhé." },
    { name: "Ánh Dương", wish: "Chúc bạn luôn mang theo hơi ấm và ánh sáng đến mọi nơi bạn đi qua." },
    { name: "Khả Ái", wish: "Mong thế giới này luôn dịu dàng với một người đáng yêu như bạn." },
    { name: "Mai Anh", wish: "Chúc bạn một thanh xuân rực rỡ và không hối tiếc với những đam mê." },
    { name: "Ngọc Diệp", wish: "Như lá ngọc cành vàng, chúc bạn luôn thanh cao và tràn đầy sức sống." },
    { name: "Thảo Vy", wish: "Mong những giấc mơ của bạn sẽ sớm trở thành hiện thực tươi đẹp." },
    { name: "Yến Nhi", wish: "Hãy luôn là chú chim nhỏ tự do, sải cánh bay giữa bầu trời của riêng mình." },
    { name: "Tố Uyên", wish: "Chúc bạn tìm thấy niềm vui trong từng điều nhỏ nhặt nhất của cuộc sống." },
    { name: "Diễm Quỳnh", wish: "Vẻ đẹp của bạn không chỉ ở vẻ ngoài mà còn ở trái tim ấm áp." }
];

function init() {
    width = window.innerWidth;
    height = window.innerHeight;
    centerX = width / 2;
    centerY = height / 2;
    canvas.width = width;
    canvas.height = height;
}

window.addEventListener('resize', init);
init();

class Particle {
    constructor(x, y, isSpecial = false) {
        this.reset(x, y, isSpecial);
    }
    reset(x, y, isSpecial) {
        this.x = x || Math.random() * width;
        this.y = y || Math.random() * height;
        this.vx = (Math.random() - 0.5) * 0.7;
        this.vy = (Math.random() - 0.5) * 0.7;
        this.life = 1;
        this.decay = Math.random() * 0.005 + 0.002;
        this.size = isSpecial ? Math.random() * 3 + 1 : Math.random() * 1.2;
        this.color = isSpecial ? '#ffcf7d' : (Math.random() > 0.5 ? '#ff85a2' : '#fff');
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
        if (this.life <= 0) this.reset();
    }
    draw() {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

class OrganicFlower {
    constructor(index, person) {
        this.index = index;
        this.name = person.name;
        this.wish = person.wish;
        
        const radius = Math.min(width, height) * 0.35;
        const angle = (index / 17) * Math.PI * 2 - Math.PI/2;
        this.x = centerX + Math.cos(angle) * radius;
        this.y = centerY + Math.sin(angle) * radius;

        this.size = 0;
        this.maxSize = 40 + Math.random() * 20;
        this.hue = 330 + (index * 4);
        this.petals = 6 + Math.floor(Math.random() * 4);
        this.points = [];
        this.initFlower();
        this.createLabel();
    }

    initFlower() {
        for (let i = 0; i < this.petals; i++) {
            this.points.push({
                rot: (i / this.petals) * Math.PI * 2,
                len: 1.1 + Math.random() * 0.4
            });
        }
    }

    createLabel() {
        const label = document.createElement('div');
        label.className = 'member-name';
        label.innerText = this.name;
        label.style.left = `${this.x}px`;
        label.style.top = `${this.y + 60}px`;
        labelsContainer.appendChild(label);
        this.uiLabel = label;
    }

    draw() {
        if (this.size < 0.1) return;
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(frame * 0.005);
        this.points.forEach(p => {
            ctx.save();
            ctx.rotate(p.rot);
            const grad = ctx.createLinearGradient(0, 0, 0, this.size * p.len);
            grad.addColorStop(0, `hsla(${this.hue}, 100%, 85%, 0.8)`);
            grad.addColorStop(1, `hsla(${this.hue + 20}, 60%, 40%, 0)`);
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(this.size * 0.7, this.size * 0.5, this.size * 0.5, this.size * p.len, 0, this.size * p.len);
            ctx.bezierCurveTo(-this.size * 0.5, this.size * p.len, -this.size * 0.7, this.size * 0.5, 0, 0);
            ctx.fill();
            ctx.restore();
        });
        ctx.beginPath();
        ctx.arc(0, 0, this.size/5, 0, Math.PI * 2);
        ctx.fillStyle = "#fff";
        ctx.fill();
        ctx.restore();
    }

    update() {
        if (this.size < this.maxSize) {
            this.size += (this.maxSize - this.size) * 0.08;
            if (this.size > this.maxSize * 0.7) {
                this.uiLabel.style.opacity = 1;
                this.uiLabel.style.transition = 'opacity 1s ease';
            }
        }
    }
}

for (let i = 0; i < 120; i++) particles.push(new Particle());

window.addEventListener('mousedown', (e) => {
    if (flowers.length < 17) {
        const currentData = data[flowers.length];
        const flower = new OrganicFlower(flowers.length, currentData);
        flowers.push(flower);
        
        // Hiệu ứng Subtitle nghệ thuật
        updateSubtitle(currentData.wish);

        for(let i=0; i<15; i++) {
            particles.push(new Particle(e.clientX, e.clientY, true));
        }
        document.getElementById('hint').style.opacity = 0;
    } else if (flowers.length === 17) {
        showFinalDate();
        flowers.push({ isDummy: true });
    }
});

function updateSubtitle(text) {
    // Hiệu ứng fade out -> đổi chữ -> fade in
    wishSubtitle.style.opacity = 0;
    wishSubtitle.style.transform = 'translateY(10px)';
    
    setTimeout(() => {
        wishSubtitle.innerText = text;
        wishSubtitle.style.transition = 'none';
        setTimeout(() => {
            wishSubtitle.style.transition = 'all 1s cubic-bezier(0.165, 0.84, 0.44, 1)';
            wishSubtitle.style.opacity = 1;
            wishSubtitle.style.transform = 'translateY(0)';
        }, 50);
    }, 400);
}

function showFinalDate() {
    wishSubtitle.style.opacity = 0; // Ẩn subtitle khi kết thúc
    const fd = document.getElementById('final-date');
    const fs = document.getElementById('final-sub');
    fd.style.transition = "all 4s cubic-bezier(0.19, 1, 0.22, 1)";
    fd.style.opacity = 1;
    fd.style.filter = "blur(0px)";
    setTimeout(() => {
        fs.style.opacity = 0.6;
        fs.style.transition = "opacity 2s ease";
    }, 2000);
    particles.forEach(p => {
        p.vx = (centerX - p.x) * 0.03;
        p.vy = (centerY - p.y) * 0.03;
    });
}

function animate() {
    frame++;
    ctx.fillStyle = 'rgba(5, 5, 8, 0.18)';
    ctx.fillRect(0, 0, width, height);
    particles.forEach(p => {
        p.update();
        p.draw();
    });
    flowers.forEach(f => {
        if (!f.isDummy) {
            f.update();
            f.draw();
        }
    });
    requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
