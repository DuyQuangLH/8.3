<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>8/3 - The Unique Bloom</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #050505;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas { display: block; }
        
        .overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        h1 {
            font-size: 15px;
            letter-spacing: 8px;
            text-transform: uppercase;
            opacity: 0.6;
            font-weight: 300;
        }

        .counter {
            position: fixed;
            bottom: 30px;
            right: 30px;
            font-size: 12px;
            opacity: 0.3;
        }

        #message-box {
            position: fixed;
            top: 40%;
            width: 100%;
            text-align: center;
            font-style: italic;
            font-size: 24px;
            color: #ffb6c1;
            text-shadow: 0 0 20px rgba(255,182,193,0.5);
            opacity: 0;
            transition: all 1s ease;
        }
    </style>
</head>
<body>

<div class="overlay" id="intro">
    <h1>Create your own garden</h1>
    <p style="opacity: 0.4; font-size: 12px;">Click bất kỳ đâu để bắt đầu</p>
</div>

<div id="message-box"></div>
<div class="counter" id="counter">BLOOMS: 0</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const msgBox = document.getElementById('message-box');
const counterDisplay = document.getElementById('counter');

let width, height;
let flowers = [];
let particles = [];
let mouse = { x: -1000, y: -1000 };
let count = 0;

const quotes = [
    "Dịu dàng như hơi thở của mùa xuân",
    "Mỗi đóa hoa là một tâm hồn rực rỡ",
    "Bạn xứng đáng với mọi điều lấp lánh nhất",
    "Hành trình của bạn là một kiệt tác",
    "Tỏa sáng theo cách của riêng mình",
    "Thế giới trân trọng sự hiện diện của bạn",
    "Mạnh mẽ như cỏ dại, thanh tao như hoa hồng",
    "Chúc bạn một ngày 8/3 trọn vẹn yêu thương"
];

function init() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    
    // Khởi tạo các hạt bụi ánh sáng nền
    for(let i = 0; i < 100; i++) {
        particles.push({
            x: Math.random() * width,
            y: Math.random() * height,
            originX: Math.random() * width,
            originY: Math.random() * height,
            size: Math.random() * 2,
            color: `rgba(255, 255, 255, ${Math.random() * 0.3})`
        });
    }
}

class Branch {
    constructor(x, y, angle, color, limit) {
        this.x = x;
        this.y = y;
        this.angle = angle;
        this.color = color;
        this.limit = limit;
        this.speed = Math.random() * 2 + 1;
        this.curve = (Math.random() - 0.5) * 0.2;
        this.width = Math.random() * 2 + 1;
        this.life = 0;
    }

    draw() {
        if (this.life >= this.limit) return;
        
        ctx.beginPath();
        ctx.strokeStyle = this.color;
        ctx.lineWidth = this.width;
        ctx.lineCap = 'round';
        ctx.moveTo(this.x, this.y);
        
        this.angle += this.curve;
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;
        this.life++;
        this.width *= 0.98;

        ctx.lineTo(this.x, this.y);
        ctx.stroke();
    }
}

class SpecialFlower {
    constructor(x, y) {
        this.branches = [];
        const hue = Math.random() * 60 + 320; // Dải màu hồng - tím
        const color = `hsla(${hue}, 80%, 70%, 0.4)`;
        const numBranches = 12 + Math.floor(Math.random() * 8);
        
        for (let i = 0; i < numBranches; i++) {
            this.branches.push(new Branch(x, y, (i / numBranches) * Math.PI * 2, color, 40 + Math.random() * 30));
        }
    }
    update() {
        this.branches.forEach(b => b.draw());
    }
}

function showMessage() {
    msgBox.innerText = quotes[count % quotes.length];
    msgBox.style.opacity = '1';
    msgBox.style.transform = 'translateY(-20px)';
    
    setTimeout(() => {
        msgBox.style.opacity = '0';
        msgBox.style.transform = 'translateY(0)';
    }, 3000);
}

window.addEventListener('mousedown', e => {
    document.getElementById('intro').style.opacity = '0';
    flowers.push(new SpecialFlower(e.clientX, e.clientY));
    count++;
    counterDisplay.innerText = `BLOOMS: ${count}`;
    showMessage();
    
    // Hiệu ứng nổ hạt tại điểm click
    for(let i=0; i<20; i++) {
        particles.push({
            x: e.clientX,
            y: e.clientY,
            originX: e.clientX + (Math.random()-0.5)*300,
            originY: e.clientY + (Math.random()-0.5)*300,
            size: Math.random() * 4,
            color: `hsla(${340 + Math.random()*40}, 100%, 70%, 0.8)`,
            vx: (Math.random()-0.5)*10,
            vy: (Math.random()-0.5)*10
        });
    }
});

window.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

function animate() {
    // Không clear hoàn toàn để tạo hiệu ứng vẽ chồng lấn (Generative)
    ctx.fillStyle = 'rgba(5, 5, 5, 0.05)';
    ctx.fillRect(0, 0, width, height);

    // Xử lý hạt bụi ánh sáng
    particles.forEach((p, i) => {
        // Lực tương tác với chuột
        const dx = mouse.x - p.x;
        const dy = mouse.y - p.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        if(dist < 150) {
            p.x -= dx * 0.05;
            p.y -= dy * 0.05;
        } else {
            p.x += (p.originX - p.x) * 0.01;
            p.y += (p.originY - p.y) * 0.01;
        }

        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fill();
    });

    flowers.forEach(f => f.update());

    requestAnimationFrame(animate);
}

window.addEventListener('resize', init);
init();
animate();

</script>
</body>
</html>
