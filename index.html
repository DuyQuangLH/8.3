<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>8/3 Bloom Wall</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>

body{
margin:0;
overflow:hidden;
background:#0a0710;
color:white;
font-family:'Quicksand';
cursor:none;
}

/* canvas */

canvas{
position:fixed;
inset:0;
z-index:1;
}

/* message */

.message{

position:fixed;
top:50%;
left:50%;

transform:translate(-50%,-50%);

background:rgba(255,255,255,0.08);

backdrop-filter:blur(20px);

padding:35px 45px;

border-radius:20px;

text-align:center;

max-width:500px;

opacity:0;
visibility:hidden;

z-index:10;

}

.message h2{
font-family:'Playfair Display';
color:#ffb6d9;
}

.message p{
font-size:18px;
line-height:1.7;
}

/* cursor */

#dot{

width:6px;
height:6px;

background:white;

border-radius:50%;

position:fixed;

pointer-events:none;

z-index:1000;

}

#ring{

width:40px;
height:40px;

border:1px solid pink;

border-radius:50%;

position:fixed;

pointer-events:none;

z-index:999;

}

/* intro */

.intro{

position:fixed;
inset:0;

display:flex;
align-items:center;
justify-content:center;

flex-direction:column;

background:black;

z-index:100;

}

.intro h1{

font-family:'Playfair Display';

color:#ffb6d9;

}

.intro p{

opacity:.6;

letter-spacing:4px;

}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div id="dot"></div>
<div id="ring"></div>

<div class="intro" id="intro">
<h1>🌸 8 / 3 🌸</h1>
<p>CLICK ĐỂ TRỒNG HOA</p>
</div>

<div class="message" id="message"></div>

<script>

/* canvas */

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

/* flowers */

const flowers=[]

const messages=[

"Cảm ơn vì đã làm cho lớp mình vui hơn mỗi ngày 🌷",

"Chúc các bạn nữ luôn tự tin và tỏa sáng ✨",

"Mong rằng mỗi ngày của các bạn đều thật nhiều niềm vui 🌸",

"Các bạn chính là những bông hoa đẹp nhất của lớp 🌺",

"Happy Women's Day 💐"

]

class Flower{

constructor(x,y){

this.x=x
this.y=y

this.size=0
this.max=40+Math.random()*30

this.petals=5+Math.floor(Math.random()*3)

this.rotation=Math.random()*Math.PI

this.color=`hsl(${320+Math.random()*40},80%,70%)`

}

draw(){

ctx.save()

ctx.translate(this.x,this.y)

ctx.rotate(this.rotation)

for(let i=0;i<this.petals;i++){

ctx.rotate(Math.PI*2/this.petals)

ctx.beginPath()

ctx.ellipse(
0,
this.size,
this.size/2,
this.size,
0,
0,
Math.PI*2
)

ctx.fillStyle=this.color

ctx.fill()

}

ctx.beginPath()

ctx.arc(0,0,this.size/3,0,Math.PI*2)

ctx.fillStyle="#ffe28a"

ctx.fill()

ctx.restore()

}

grow(){

if(this.size<this.max){

this.size+=0.8

}

}

}

/* pollen particles */

const pollen=[]

class Pollen{

constructor(){

this.x=Math.random()*canvas.width
this.y=Math.random()*canvas.height

this.vy=0.2+Math.random()*0.5

}

update(){

this.y+=this.vy

if(this.y>canvas.height){

this.y=0

}

}

draw(){

ctx.fillStyle="rgba(255,230,120,0.6)"

ctx.beginPath()

ctx.arc(this.x,this.y,2,0,Math.PI*2)

ctx.fill()

}

}

for(let i=0;i<200;i++){

pollen.push(new Pollen())

}

/* click */

let clickCount=0

window.addEventListener("click",e=>{

document.getElementById("intro").style.display="none"

flowers.push(new Flower(e.clientX,e.clientY))

showMessage()

})

/* message */

function showMessage(){

const box=document.getElementById("message")

box.innerHTML="<p>"+messages[clickCount%messages.length]+"</p>"

box.style.visibility="visible"

gsap.fromTo(
box,
{opacity:0,y:40},
{opacity:1,y:0,duration:0.8}
)

gsap.to(box,{
opacity:0,
delay:3,
duration:1
})

clickCount++

}

/* animation */

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

pollen.forEach(p=>{

p.update()
p.draw()

})

flowers.forEach(f=>{

f.grow()
f.draw()

})

requestAnimationFrame(animate)

}

animate()

/* cursor */

const dot=document.getElementById("dot")
const ring=document.getElementById("ring")

document.addEventListener("mousemove",e=>{

gsap.to(dot,{x:e.clientX,y:e.clientY,duration:0})

gsap.to(ring,{x:e.clientX-20,y:e.clientY-20,duration:.2})

})

</script>

</body>
</html>
