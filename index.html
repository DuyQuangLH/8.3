<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Symphony 12/9 - 8.3</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400&family=Playfair+Display:italic@1&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcf7d;
            --pink: #ff85a2;
            --dark: #020204;
            --sub-white: rgba(255, 255, 255, 0.9);
        }

        body {
            margin: 0;
            background: var(--dark);
            color: #fff;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            user-select: none;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #ui-layer {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        .member-name {
            position: absolute;
            font-size: 9px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold);
            transform: translate(-50%, 0);
            opacity: 0;
            text-shadow: 0 0 10px rgba(255, 207, 125, 0.5);
            white-space: nowrap;
            transition: opacity 1.5s ease, transform 1.2s ease;
        }

        /* TÂM VÒNG TRÒN - NƠI HIỂN THỊ LỜI CHÚC */
        #subtitle-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px; /* Giới hạn độ rộng để không đè lên hoa */
            text-align: center;
            z-index: 20;
            pointer-events: none;
        }

        #wish-subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(16px, 1.5vw, 20px);
            color: var(--sub-white);
            line-height: 1.6;
            opacity: 0;
            transform: scale(0.95);
            text-shadow: 0 0 20px rgba(0,0,0,0.9);
            transition: all 1s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #center-piece {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .date-title {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: clamp(60px, 10vw, 110px);
            background: linear-gradient(to bottom, #fff, var(--gold), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            filter: blur(20px);
            margin: 0;
        }

        .subtitle-final {
            letter-spacing: 12px;
            font-size: 10px;
            color: var(--pink);
            opacity: 0;
            margin-top: -10px;
            text-shadow: 0 0 10px var(--pink);
        }

        #hint {
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 9px;
            letter-spacing: 4px;
            opacity: 0.4;
            color: var(--gold);
            animation: hintPulse 3s infinite;
        }

        @keyframes hintPulse {
            0%, 100% { opacity: 0.2; transform: translateY(0); }
            50% { opacity: 0.6; transform: translateY(-5px); }
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui-layer">
    <div id="labels-container"></div>
    
    <div id="subtitle-container">
        <div id="wish-subtitle"></div>
    </div>

    <div id="center-piece">
        <h1 id="final-date" class="date-title">12/9</h1>
        <p id="final-sub" class="subtitle-final">ALWAYS TOGETHER</p>
    </div>
</div>

<div id="hint">CHẠM NHẸ ĐỂ KHỞI ĐẦU SYMPHONY</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const labelsContainer = document.getElementById('labels-container');
const wishSubtitle = document.getElementById('wish-subtitle');

let width, height, centerX, centerY;
let particles = [];
let flowers = [];
let caustics = []; 
let frame = 0;
let mouse = { x: -1000, y: -1000 };

const data = [
    { name: "Như Ngân", wish: "Có lẽ ba năm bên nhau trôi nhanh hơn chúng mình từng nghĩ" },
    { name: "Ngọc Trân", wish: "Từ những ngày còn lạ lẫm, đến khi mọi thứ dần trở nên quen thuộc" },
    { name: "Bảo Khuyên", wish: "Mỗi ngày đến lớp đều thêm một kỷ niệm nhỏ" },
    { name: "Uyển Dung", wish: "Và các bạn chính là phần rất đẹp của quãng thời gian ấy" },
    { name: "Minh Châu", wish: "8/3 này có lẽ là một trong những lần cuối lớp mình cùng chúc" },
    { name: "Uyên Nhi", wish: "Chỉ mong các bạn luôn vui vẻ và giữ nụ cười như bây giờ" },
    { name: "Minh Thư", wish: "Để dù sau này mỗi người một con đường" },
    { name: "Trúc Quỳnh", wish: "Chúng ta vẫn nhớ đã từng cùng nhau đi qua tuổi trẻ" },
    { name: "Bảo Khuyên", wish: "Những buổi học bình thường rồi sẽ thành kỷ niệm" },
    { name: "Mỹ Tâm", wish: "Những tiếng cười nhỏ cũng sẽ trở nên đáng nhớ" },
    { name: "Phương Anh", wish: "Cảm ơn vì đã cùng nhau tạo nên những ngày tháng ấy" },
    { name: "Bảo Trân", wish: "Thanh xuân của lớp mình chắc chắn sẽ đẹp vì có các bạn" },
    { name: "Bảo Thy", wish: "Mong rằng tương lai sẽ luôn dịu dàng với mọi người" },
    { name: "Bảo Anh", wish: "Để mỗi người đều tìm được con đường mình muốn đi" },
    { name: "Thuỵ Khuê", wish: "Và dù sau này ở đâu" },
    { name: "Bảo Nguyên", wish: "Các bạn vẫn luôn là một phần của lớp mình" },
    { name: "Quỳnh Như", wish: "Chúc các bạn một ngày 8/3 thật vui và thật ý nghĩa" }
];

function init() {
    width = window.innerWidth;
    height = window.innerHeight;
    centerX = width / 2;
    centerY = height / 2;
    canvas.width = width;
    canvas.height = height;

    caustics = [];
    for(let i=0; i<5; i++) {
        caustics.push({
            x: Math.random() * width,
            y: Math.random() * height,
            r: 200 + Math.random() * 300,
            vx: (Math.random() - 0.5) * 0.2,
            vy: (Math.random() - 0.5) * 0.2,
            opacity: 0.03
        });
    }
}

window.addEventListener('resize', init);
init();

class Particle {
    constructor(x, y, isSpecial = false) {
        this.isSpecial = isSpecial;
        this.reset(x, y, isSpecial);
    }
    reset(x, y, isSpecial) {
        this.x = x || Math.random() * width;
        this.y = y || Math.random() * height;
        this.vx = (Math.random() - 0.5) * 0.8;
        this.vy = (Math.random() - 0.5) * 0.8;
        this.life = 1;
        this.decay = Math.random() * 0.005 + 0.003;
        this.size = isSpecial ? Math.random() * 3 + 1.5 : Math.random() * 1.2;
        this.color = isSpecial ? '#ffcf7d' : (Math.random() > 0.6 ? '#ff85a2' : '#fff');
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
        if (this.life <= 0 && !this.isSpecial) this.reset();
    }
    draw() {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

class EtherealFlower {
    constructor(index, person) {
        this.index = index;
        this.name = person.name;
        
        // Bán kính vòng hoa được đẩy xa tâm một chút để nhường chỗ cho text
        const radius = Math.min(width, height) * 0.35; 
        const angle = (index / 17) * Math.PI * 2 - Math.PI/2;
        this.x = centerX + Math.cos(angle) * radius;
        this.y = centerY + Math.sin(angle) * radius;

        this.size = 0;
        this.maxSize = 35 + Math.random() * 10;
        this.hue = 330 + (index * 4);
        this.petals = 7 + Math.floor(Math.random() * 3);
        this.points = [];
        this.wobblePhase = Math.random() * Math.PI * 2;
        this.initFlower();
        this.createLabel();
    }

    initFlower() {
        for (let i = 0; i < this.petals; i++) {
            this.points.push({
                rot: (i / this.petals) * Math.PI * 2,
                len: 1.1 + Math.random() * 0.3,
                curve: 0.6 + Math.random() * 0.3
            });
        }
    }

    createLabel() {
        const label = document.createElement('div');
        label.className = 'member-name';
        label.innerText = this.name;
        // Tên thành viên nằm phía ngoài vòng hoa
        const labelRadius = Math.min(width, height) * 0.35 + 50;
        const angle = (this.index / 17) * Math.PI * 2 - Math.PI/2;
        label.style.left = `${centerX + Math.cos(angle) * labelRadius}px`;
        label.style.top = `${centerY + Math.sin(angle) * labelRadius}px`;
        labelsContainer.appendChild(label);
        this.uiLabel = label;
    }

    draw() {
        if (this.size < 0.1) return;
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(frame * 0.005 + Math.sin(frame * 0.02 + this.wobblePhase) * 0.05);

        this.points.forEach(p => {
            ctx.save();
            ctx.rotate(p.rot);
            const grad = ctx.createLinearGradient(0, 0, 0, this.size * p.len);
            grad.addColorStop(0, `hsla(${this.hue}, 100%, 88%, 0.8)`);
            grad.addColorStop(0.5, `hsla(${this.hue + 15}, 80%, 60%, 0.3)`);
            grad.addColorStop(1, `hsla(${this.hue + 30}, 60%, 40%, 0)`);
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(this.size * p.curve, this.size * 0.5, this.size * 0.5, this.size * p.len, 0, this.size * p.len);
            ctx.bezierCurveTo(-this.size * 0.5, this.size * p.len, -this.size * p.curve, this.size * 0.5, 0, 0);
            ctx.fill();
            ctx.restore();
        });

        ctx.beginPath();
        ctx.arc(0, 0, this.size/6, 0, Math.PI * 2);
        ctx.fillStyle = "#fff";
        ctx.fill();
        ctx.restore();
    }

    update() {
        if (this.size < this.maxSize) {
            this.size += (this.maxSize - this.size) * 0.07;
            if (this.size > this.maxSize * 0.5) {
                this.uiLabel.style.opacity = 1;
            }
        }
    }
}

for (let i = 0; i < 120; i++) particles.push(new Particle());

window.addEventListener('mousedown', (e) => {
    if (flowers.length < 17) {
        const currentData = data[flowers.length];
        const flower = new EtherealFlower(flowers.length, currentData);
        flowers.push(flower);
        updateSubtitle(currentData.wish);
        for(let i=0; i<15; i++) {
            particles.push(new Particle(e.clientX, e.clientY, true));
        }
        document.getElementById('hint').style.opacity = 0;
    } else if (flowers.length === 17) {
        showFinalDate();
        flowers.push({ isDummy: true });
    }
});

function updateSubtitle(text) {
    wishSubtitle.style.opacity = 0;
    wishSubtitle.style.transform = 'translate(-50%, -50%) scale(0.9)';
    
    setTimeout(() => {
        wishSubtitle.innerText = text;
        wishSubtitle.style.opacity = 1;
        wishSubtitle.style.transform = 'scale(1)';
    }, 300);
}

function showFinalDate() {
    wishSubtitle.style.display = 'none';
    const fd = document.getElementById('final-date');
    const fs = document.getElementById('final-sub');
    fd.style.transition = "all 4s ease-out";
    fd.style.opacity = 1;
    fd.style.filter = "blur(0px)";
    setTimeout(() => {
        fs.style.opacity = 0.6;
    }, 2000);
}

function animate() {
    frame++;
    ctx.fillStyle = 'rgba(2, 2, 4, 0.2)';
    ctx.fillRect(0, 0, width, height);

    ctx.globalCompositeOperation = 'lighter';
    caustics.forEach(c => {
        c.x += c.vx; c.y += c.vy;
        if(c.x < 0 || c.x > width) c.vx *= -1;
        if(c.y < 0 || c.y > height) c.vy *= -1;
        ctx.globalAlpha = c.opacity;
        let grad = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, c.r);
        grad.addColorStop(0, '#ffcf7d22');
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, Math.PI*2);
        ctx.fill();
    });
    ctx.globalCompositeOperation = 'source-over';

    particles.forEach((p, i) => {
        p.update();
        p.draw();
        if(p.life <= 0 && p.isSpecial) particles.splice(i, 1);
    });

    flowers.forEach(f => {
        if (!f.isDummy) {
            f.update();
            f.draw();
        }
    });

    requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
