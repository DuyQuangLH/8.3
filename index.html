<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>8.3 Constellation</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>

body{
margin:0;
overflow:hidden;
background:#05050a;
font-family:Quicksand;
color:white;
cursor:none;
}

/* canvas */

canvas{
position:fixed;
inset:0;
}

/* intro */

.intro{

position:fixed;
inset:0;

display:flex;
align-items:center;
justify-content:center;

flex-direction:column;

background:black;

z-index:10;

transition:1s;

}

.intro.hide{
opacity:0;
pointer-events:none;
}

.intro h1{
font-family:Playfair Display;
color:#ffb6d9;
}

/* message */

.message{

position:fixed;

top:50%;
left:50%;

transform:translate(-50%,-50%);

background:rgba(255,255,255,0.08);

backdrop-filter:blur(20px);

padding:40px;

border-radius:20px;

max-width:500px;

text-align:center;

opacity:0;

pointer-events:none;

}

/* cursor */

#dot{
width:6px;
height:6px;
background:white;
border-radius:50%;
position:fixed;
z-index:100;
}

#ring{
width:40px;
height:40px;
border:1px solid pink;
border-radius:50%;
position:fixed;
z-index:99;
}

</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="dot"></div>
<div id="ring"></div>

<div class="intro" id="intro">
<h1>8 / 3</h1>
<p>Click để bắt đầu</p>
</div>

<div class="message" id="msg"></div>

<script>

/* canvas */

const canvas=document.getElementById("c")
const ctx=canvas.getContext("2d")

let w=canvas.width=window.innerWidth
let h=canvas.height=window.innerHeight

/* mouse */

const mouse={x:w/2,y:h/2}

document.addEventListener("mousemove",e=>{

mouse.x=e.clientX
mouse.y=e.clientY

})

/* particle */

class Star{

constructor(){

this.reset()

}

reset(){

this.x=Math.random()*w
this.y=Math.random()*h

this.vx=(Math.random()-0.5)*0.5
this.vy=(Math.random()-0.5)*0.5

this.size=Math.random()*2+0.5

this.alpha=Math.random()

}

update(){

let dx=mouse.x-this.x
let dy=mouse.y-this.y

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<120){

this.vx+=dx*0.0003
this.vy+=dy*0.0003

}

this.x+=this.vx
this.y+=this.vy

this.vx*=0.98
this.vy*=0.98

}

draw(){

ctx.beginPath()
ctx.arc(this.x,this.y,this.size,0,Math.PI*2)

ctx.fillStyle="rgba(255,255,255,"+this.alpha+")"
ctx.fill()

}

}

/* create stars */

const stars=[]

for(let i=0;i<800;i++){

stars.push(new Star())

}

/* burst */

function burst(x,y){

for(let i=0;i<60;i++){

let s=new Star()

s.x=x
s.y=y

s.vx=(Math.random()-0.5)*6
s.vy=(Math.random()-0.5)*6

stars.push(s)

}

}

/* messages */

const wishes=[

"Cảm ơn vì đã làm cho lớp mình rực rỡ hơn ✨",

"Chúc các bạn nữ luôn tự tin và hạnh phúc 🌸",

"Mong rằng mỗi ngày của các bạn đều tràn đầy niềm vui 🌷",

"Happy Women's Day ❤️",

"Các bạn chính là những vì sao của lớp ⭐"

]

/* show message */

function showMessage(){

const m=document.getElementById("msg")

m.innerHTML="<p>"+wishes[Math.floor(Math.random()*wishes.length)]+"</p>"

gsap.fromTo(
m,
{opacity:0,y:40},
{opacity:1,y:0,duration:0.8}
)

gsap.to(m,{
opacity:0,
delay:3
})

}

/* click */

document.addEventListener("click",e=>{

burst(e.clientX,e.clientY)

showMessage()

})

/* animation */

function animate(){

ctx.clearRect(0,0,w,h)

stars.forEach(s=>{

s.update()
s.draw()

})

requestAnimationFrame(animate)

}

animate()

/* cursor */

const dot=document.getElementById("dot")
const ring=document.getElementById("ring")

document.addEventListener("mousemove",e=>{

gsap.to(dot,{x:e.clientX,y:e.clientY,duration:0})
gsap.to(ring,{x:e.clientX-20,y:e.clientY-20,duration:0.2})

})

/* intro */

document.getElementById("intro").onclick=()=>{

document.getElementById("intro").classList.add("hide")

}

</script>

</body>
</html>
