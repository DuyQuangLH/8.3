<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>8/3 Class Awards</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
background:radial-gradient(circle,#222,#000);
color:white;
font-family:Poppins;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

#stage{
text-align:center;
}

h1{
font-size:50px;
margin-bottom:10px;
color:#ffd700;
}

button{
padding:15px 35px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4da6;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

#awardBox{

margin-top:40px;
font-size:28px;

opacity:0;
transform:scale(.5);
transition:1s;

}

.show{
opacity:1 !important;
transform:scale(1) !important;
}

#title{

font-size:36px;
color:#ffd700;
margin-bottom:20px;

}

#name{

font-size:40px;
color:#ff99cc;

}

.confetti{

position:absolute;
width:8px;
height:8px;
background:red;
animation:fall linear infinite;

}

@keyframes fall{

0%{
transform:translateY(-10vh) rotate(0);
}

100%{
transform:translateY(110vh) rotate(720deg);
}

}

</style>
</head>


<body>

<div id="stage">

<h1>Class Goddess Awards</h1>

<button onclick="nextAward()">🎉 Bắt đầu trao giải</button>

<div id="awardBox">

<div id="title"></div>
<div id="name"></div>

</div>

</div>

<script>

const names=[

"Quỳnh Như",
"Châu",
"Lan",
"Mai",
"Hà",
"Vy",
"Thảo",
"Trâm",
"Ngọc",
"An",
"Trang",
"Linh",
"Phương",
"Nhi",
"Yến",
"Hương",
"Tú",
"Khánh",
"Thư"

]

const awards=[

"Nữ thần chăm chỉ",
"Nữ thần năng lượng",
"Nữ thần dễ thương",
"Nữ thần hài hước",
"Nữ thần học bá",
"Nữ thần nghệ thuật",
"Nữ thần chill",
"Nữ thần sáng tạo",
"Nữ thần meme",
"Nữ thần tích cực",
"Nữ thần thân thiện",
"Nữ thần bí ẩn",
"Nữ thần đa tài"

]

function nextAward(){

let name=names[Math.floor(Math.random()*names.length)]
let award=awards[Math.floor(Math.random()*awards.length)]

document.getElementById("title").innerText=award
document.getElementById("name").innerText=name

let box=document.getElementById("awardBox")

box.classList.remove("show")

setTimeout(()=>{

box.classList.add("show")

},100)

createConfetti()

}

function createConfetti(){

for(let i=0;i<80;i++){

let c=document.createElement("div")

c.className="confetti"

c.style.left=Math.random()*100+"vw"

c.style.background=
"hsl("+Math.random()*360+",80%,60%)"

c.style.animationDuration=
(3+Math.random()*3)+"s"

document.body.appendChild(c)

setTimeout(()=>{

c.remove()

},6000)

}

}

</script>

</body>

</html>
