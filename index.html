<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8/3 Bloom Garden - Nghệ Thuật Của Sự Dịu Dàng</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:italic,wght@0,700;1,700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --primary-pink: #ff85a2;
            --soft-gold: #f3e5ab;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a0f1a 0%, #050505 100%);
            color: white;
            font-family: 'Quicksand', sans-serif;
            cursor: none;
        }

        canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        /* UI Elements */
        .ui-layer {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .intro-text {
            text-align: center;
            transition: opacity 1s ease;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            margin: 0;
            background: linear-gradient(to right, #ffb6d9, #ff85a2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(255, 133, 162, 0.3);
        }

        .hint {
            letter-spacing: 5px;
            font-size: 0.9rem;
            opacity: 0.5;
            text-transform: uppercase;
            margin-top: 10px;
        }

        #message-container {
            position: absolute;
            bottom: 15%;
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            border: 1px solid rgba(255, 182, 217, 0.2);
            transform: translateY(50px);
            opacity: 0;
            text-align: center;
        }

        /* Custom Cursor */
        #cursor-follower {
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            mix-blend-mode: difference;
        }

        #cursor-ring {
            width: 40px;
            height: 40px;
            border: 2px solid var(--primary-pink);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 999;
            transition: transform 0.1s ease-out;
        }
    </style>
</head>
<body>

<canvas id="garden"></canvas>

<div id="cursor-follower"></div>
<div id="cursor-ring"></div>

<div class="ui-layer">
    <div class="intro-text" id="intro">
        <h1>Gently Bloom</h1>
        <p class="hint">Chạm vào màn hình để gieo mầm hạnh phúc</p>
    </div>

    <div id="message-container">
        <span id="message-text" style="font-style: italic; font-size: 1.2rem;"></span>
    </div>
</div>

<script>
    const canvas = document.getElementById("garden");
    const ctx = canvas.getContext("2d");
    let width, height;
    const flowers = [];
    const sparkles = [];
    
    const messages = [
        "Bạn là đóa hoa rực rỡ nhất hôm nay 🌸",
        "Thế giới đẹp hơn vì có sự dịu dàng của bạn ✨",
        "Luôn tự tin và tỏa sáng theo cách của riêng mình 💐",
        "Chúc bạn một ngày 8/3 tràn ngập yêu thương 🎀",
        "Mỗi nụ cười của bạn là một mầm xanh hy vọng 🌷"
    ];

    let clickCount = 0;

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }

    window.addEventListener("resize", resize);
    resize();

    class Sparkle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.size = Math.random() * 3;
            this.vX = (Math.random() - 0.5) * 2;
            this.vY = (Math.random() - 0.5) * 2;
            this.life = 1;
        }
        update() {
            this.x += this.vX;
            this.y += this.vY;
            this.life -= 0.01;
        }
        draw() {
            ctx.fillStyle = `rgba(255, 230, 150, ${this.life})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    class Flower {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.size = 0;
            this.targetSize = 40 + Math.random() * 40;
            this.petals = Math.floor(Math.random() * 3) + 5;
            this.colorHue = 330 + Math.random() * 40; // Pink to Purple
            this.rotation = Math.random() * Math.PI * 2;
            this.wobble = 0;
        }

        draw() {
            this.wobble += 0.02;
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation + Math.sin(this.wobble) * 0.1);

            for (let i = 0; i < this.petals; i++) {
                ctx.rotate((Math.PI * 2) / this.petals);
                
                // Vẽ cánh hoa kiểu giọt nước mềm mại
                ctx.beginPath();
                let gradient = ctx.createRadialGradient(0, 0, 0, 0, this.size, this.size);
                gradient.addColorStop(0, `hsla(${this.colorHue}, 90%, 80%, 0.8)`);
                gradient.addColorStop(1, `hsla(${this.colorHue - 20}, 70%, 50%, 0)`);
                
                ctx.fillStyle = gradient;
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(this.size, -this.size, this.size * 1.5, this.size, 0, this.size);
                ctx.bezierCurveTo(-this.size * 1.5, this.size, -this.size, -this.size, 0, 0);
                ctx.fill();
            }

            // Nhụy hoa phát sáng
            ctx.beginPath();
            ctx.arc(0, 0, this.size/4, 0, Math.PI * 2);
            ctx.fillStyle = "#fff";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "gold";
            ctx.fill();
            ctx.restore();
        }

        grow() {
            if (this.size < this.targetSize) {
                this.size += (this.targetSize - this.size) * 0.05;
            }
        }
    }

    // Tương tác chuột
    const follower = document.getElementById("cursor-follower");
    const ring = document.getElementById("cursor-ring");

    window.addEventListener("mousemove", (e) => {
        gsap.to(follower, {x: e.clientX, y: e.clientY, duration: 0.1});
        gsap.to(ring, {x: e.clientX - 20, y: e.clientY - 20, duration: 0.3});
        
        // Thêm hạt lấp lánh khi di chuyển
        if (Math.random() > 0.8) {
            sparkles.push(new Sparkle(e.clientX, e.clientY));
        }
    });

    window.addEventListener("click", (e) => {
        // Ẩn intro khi bắt đầu click
        gsap.to("#intro", {opacity: 0, duration: 1});

        // Tạo hoa
        flowers.push(new Flower(e.clientX, e.clientY));
        
        // Hiệu ứng "Bùng nổ" hạt
        for(let i=0; i<15; i++) {
            sparkles.push(new Sparkle(e.clientX, e.clientY));
        }

        showText();
        clickCount++;
    });

    function showText() {
        const container = document.getElementById("message-container");
        const text = document.getElementById("message-text");
        
        // Dọn dẹp animation cũ của GSAP để tránh bug chồng chéo
        gsap.killTweensOf(container);
        
        text.innerText = messages[clickCount % messages.length];
        
        let tl = gsap.timeline();
        tl.to(container, {opacity: 1, y: 0, duration: 0.5, ease: "back.out"})
          .to(container, {opacity: 0, y: 20, duration: 1, delay: 2});
    }

    function animate() {
        // Tạo hiệu ứng mờ dần (trail effect) thay vì clear hoàn toàn
        ctx.fillStyle = "rgba(10, 7, 16, 0.15)";
        ctx.fillRect(0, 0, width, height);

        sparkles.forEach((s, index) => {
            s.update();
            s.draw();
            if (s.life <= 0) sparkles.splice(index, 1);
        });

        flowers.forEach(f => {
            f.grow();
            f.draw();
        });

        requestAnimationFrame(animate);
    }

    animate();
</script>

</body>
</html>
