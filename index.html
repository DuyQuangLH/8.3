<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Ethereal Symphony 12/9 - International Women's Day</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Montserrat:wght@200;400&family=Playfair+Display:italic@1&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcf7d;
            --pink: #ff85a2;
            --dark: #050508;
            --sub-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            margin: 0;
            background: var(--dark);
            color: #fff;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            user-select: none;
            cursor: crosshair;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            /* Tạo hiệu ứng mờ nhẹ toàn cảnh */
            filter: blur(0.4px);
        }

        /* UI Layers */
        #ui-layer {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        /* Tên thành viên dưới mỗi bông hoa */
        .member-name {
            position: absolute;
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold);
            transform: translate(-50%, 0);
            opacity: 0;
            text-shadow: 0 0 15px rgba(255, 207, 125, 0.5);
            white-space: nowrap;
            will-change: transform, opacity;
        }

        /* Phụ đề lời chúc phía dưới */
        #subtitle-container {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            text-align: center;
            z-index: 20;
            padding: 20px;
            background: var(--sub-bg);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #wish-subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 17px;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.7;
            opacity: 0;
            transform: translateY(15px);
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* Finale Elements */
        #center-piece {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .date-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(50px, 9vw, 110px);
            background: linear-gradient(to bottom, #fff 40%, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            filter: blur(25px);
            margin: 0;
            text-shadow: 0 0 30px rgba(255, 207, 125, 0.3);
        }

        .subtitle-final {
            letter-spacing: 12px;
            font-size: 10px;
            color: var(--pink);
            opacity: 0;
            margin-top: -5px;
        }

        #hint {
            position: fixed;
            bottom: 25px;
            width: 100%;
            text-align: center;
            font-size: 8px;
            letter-spacing: 6px;
            opacity: 0.3;
            color: var(--gold);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui-layer">
    <div id="labels-container"></div>
    
    <div id="subtitle-container">
        <div id="wish-subtitle"></div>
    </div>

    <div id="center-piece">
        <h1 id="final-date" class="date-title">12/9</h1>
        <p id="final-sub" class="subtitle-final">ALWAYS TOGETHER</p>
    </div>
</div>

<div id="hint">TAP TO UNVEIL THE SYMPHONY</div>

<script>
/**
 * THE 12/9 SYMPHONY - ANIMATED EDDITION
 * A generative art piece with organic physics and real-time textured rendering
 */

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const labelsContainer = document.getElementById('labels-container');
const wishSubtitle = document.getElementById('wish-subtitle');

let width, height, centerX, centerY;
let particles = [];
let flowers = [];
let frame = 0;
let mouse = { x: -1000, y: -1000 };
let isFinished = false;

// Thuật toán Noise đơn giản để tạo hiệu ứng gió tự nhiên
const noise = () => (Math.random() - 0.5) * 2;

const data = [
    { name: "Huyền My", wish: "Mong nụ cười của bạn luôn rạng rỡ như đóa hướng dương đón nắng." },
    { name: "Linh Đan", wish: "Chúc bạn luôn giữ được sự dịu dàng và tâm hồn an yên giữa cuộc sống." },
    { name: "Minh Tú", wish: "Hãy tỏa sáng theo cách riêng của bạn, vì bạn là phiên bản duy nhất." },
    { name: "Thanh Trúc", wish: "Chúc bạn mỗi ngày đều là một bản nhạc ngọt ngào và đầy cảm hứng." },
    { name: "Phương Nghi", wish: "Mong những điều tốt đẹp nhất sẽ luôn tìm đến với cô gái kiên cường." },
    { name: "Gia Hân", wish: "Chúc bạn luôn hạnh phúc và gặt hái được nhiều thành công trên con đường đã chọn." },
    { name: "Tuệ Lâm", wish: "Sự thông tuệ và bản lĩnh của bạn luôn là nguồn năng lượng tích cực cho mọi người." },
    { name: "Quỳnh Chi", wish: "Chúc bạn mãi xinh đẹp và tỏa hương thơm ngát như loài hoa Quỳnh." },
    { name: "Bảo Ngọc", wish: "Bạn là viên ngọc quý, hãy luôn tự tin và trân trọng bản thân mình nhé." },
    { name: "Ánh Dương", wish: "Chúc bạn luôn mang theo hơi ấm và ánh sáng đến mọi nơi bạn đi qua." },
    { name: "Khả Ái", wish: "Mong thế giới này luôn dịu dàng với một người đáng yêu như bạn." },
    { name: "Mai Anh", wish: "Chúc bạn một thanh xuân rực rỡ và không hối tiếc với những đam mê." },
    { name: "Ngọc Diệp", wish: "Như lá ngọc cành vàng, chúc bạn luôn thanh cao và tràn đầy sức sống." },
    { name: "Thảo Vy", wish: "Mong những giấc mơ của bạn sẽ sớm trở thành hiện thực tươi đẹp." },
    { name: "Yến Nhi", wish: "Hãy luôn là chú chim nhỏ tự do, sải cánh bay giữa bầu trời của riêng mình." },
    { name: "Tố Uyên", wish: "Chúc bạn tìm thấy niềm vui trong từng điều nhỏ nhặt nhất của cuộc sống." },
    { name: "Diễm Quỳnh", wish: "Vẻ đẹp của bạn không chỉ ở vẻ ngoài mà còn ở trái tim ấm áp." }
];

function init() {
    width = window.innerWidth;
    height = window.innerHeight;
    centerX = width / 2;
    centerY = height / 2;
    canvas.width = width;
    canvas.height = height;
}

window.addEventListener('resize', init);
init();

// --- Hệ thống Hạt Sáng Nâng Cấp (Chùm hạt xoáy) ---
class Particle {
    constructor(x, y, isSpecial = false) {
        this.reset(x, y, isSpecial);
    }
    reset(x, y, isSpecial) {
        this.x = x || Math.random() * width;
        this.y = y || Math.random() * height;
        // Tốc độ cơ bản chậm hơn để tạo vẻ thanh thản
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.life = 1;
        this.decay = Math.random() * 0.003 + 0.001; // Sống lâu hơn
        this.size = isSpecial ? Math.random() * 3.5 + 1.5 : Math.random() * 1.0;
        this.color = isSpecial ? '#ffcf7d' : (Math.random() > 0.6 ? '#ff85a2' : '#fff');
        // Thêm tham số xoáy cho chùm hạt đặc biệt
        this.wobble = Math.random() * Math.PI * 2;
        this.wobbleSpeed = 0.05;
    }
    update() {
        if (isFinished) {
            // Hút về tâm mạnh mẽ khi kết thúc
            this.vx += (centerX - this.x) * 0.001;
            this.vy += (centerY - this.y) * 0.001;
            this.decay = 0.0005;
        } else {
            // Hiệu ứng "gió bụi" nhẹ
            this.vx += noise() * 0.01;
            this.vy += noise() * 0.01;
        }

        this.x += this.vx;
        this.y += this.vy;
        
        // Thêm chuyển động hình sin nhẹ nếu là hạt đặc biệt
        if (this.size > 2) {
            this.wobble += this.wobbleSpeed;
            this.x += Math.sin(this.wobble) * 0.2;
        }

        this.life -= this.decay;
        if (this.life <= 0 && !isFinished) this.reset();
    }
    draw() {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        
        if (this.size > 1.5) {
            ctx.shadowBlur = 12;
            ctx.shadowColor = this.color;
        }
        
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

// --- Hệ thống Hoa Hữu Cơ (Có gió thổi và vân cánh hoa) ---
class OrganicFlower {
    constructor(index, person) {
        this.index = index;
        this.name = person.name;
        this.wish = person.wish;
        
        // Sắp xếp vòng xoáy Phyllotaxis vàng
        const radius = Math.min(width, height) * 0.36;
        const angle = (index / 17) * Math.PI * 2 - Math.PI/2;
        this.baseX = centerX + Math.cos(angle) * radius;
        this.baseY = centerY + Math.sin(angle) * radius;
        
        // Vị trí thực tế (sẽ thay đổi do gió)
        this.x = this.baseX;
        this.y = this.baseY;

        this.size = 0;
        this.maxSize = 42 + Math.random() * 20;
        this.hue = 330 + (index * 4);
        this.petals = 7 + Math.floor(Math.random() * 4);
        this.points = [];
        // Tham số gió riêng cho từng bông
        this.windPhase = Math.random() * Math.PI * 2;
        this.windSpeed = 0.005 + Math.random() * 0.005;
        
        this.initFlower();
        this.createLabel();
    }

    initFlower() {
        for (let i = 0; i < this.petals; i++) {
            this.points.push({
                rot: (i / this.petals) * Math.PI * 2,
                len: 1.1 + Math.random() * 0.5,
                curve: 0.6 + Math.random() * 0.3
            });
        }
    }

    createLabel() {
        const label = document.createElement('div');
        label.className = 'member-name';
        label.innerText = this.name;
        label.style.left = `${this.x}px`;
        label.style.top = `${this.y + 65}px`;
        labelsContainer.appendChild(label);
        this.uiLabel = label;
    }

    draw() {
        if (this.size < 0.1) return;
        ctx.save();
        ctx.translate(this.x, this.y);
        // Xoay nhẹ bông hoa theo thời gian
        ctx.rotate(frame * 0.004 + this.windPhase);

        this.points.forEach(p => {
            ctx.save();
            ctx.rotate(p.rot);
            
            const petalLen = this.size * p.len;
            const petalWid = this.size * p.curve;

            // Gradient phức tạp hơn để tạo chiều sâu
            const grad = ctx.createLinearGradient(0, 0, 0, petalLen);
            grad.addColorStop(0, `hsla(${this.hue}, 100%, 88%, 0.9)`); // Gốc sáng
            grad.addColorStop(0.4, `hsla(${this.hue + 10}, 90%, 70%, 0.8)`); // Thân hồng
            grad.addColorStop(1, `hsla(${this.hue + 30}, 60%, 40%, 0)`); // Đầu trong suốt

            ctx.fillStyle = grad;
            // Thêm shadow để tạo cảm giác các cánh hoa đè lên nhau (layering)
            ctx.shadowBlur = 10 * (this.size / this.maxSize);
            ctx.shadowColor = `hsla(${this.hue}, 100%, 60%, 0.3)`;

            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(petalWid, petalLen * 0.3, petalWid, petalLen * 0.8, 0, petalLen);
            ctx.bezierCurveTo(-petalWid, petalLen * 0.8, -petalWid, petalLen * 0.3, 0, 0);
            ctx.fill();
            
            // THÊM HIỆU ỨNG VÂN CÁNH HOA (Hạt nhiễu li ti)
            if (this.size > this.maxSize * 0.6) {
                ctx.globalAlpha = 0.03 * (this.size / this.maxSize);
                ctx.fillStyle = "#fff";
                for(let i=0; i<5; i++) {
                    ctx.beginPath();
                    ctx.arc(noise()*petalWid, Math.random()*petalLen, 0.5, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }

            ctx.restore();
        });
        
        // Nhụy hoa phát sáng vàng
        ctx.beginPath();
        ctx.arc(0, 0, this.size/4.5, 0, Math.PI * 2);
        const nhuyGrad = ctx.createRadialGradient(0,0,0, 0,0, this.size/4.5);
        nhuyGrad.addColorStop(0, "#fff");
        nhuyGrad.addColorStop(1, "#ffd700");
        ctx.fillStyle = nhuyGrad;
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#ffd700";
        ctx.fill();
        
        ctx.restore();
        ctx.shadowBlur = 0;
    }

    update() {
        // Thuật toán Gió đung đưa: Cập nhật vị trí dựa trên baseX/Y + nhiễu
        this.windPhase += this.windSpeed;
        const swayX = Math.sin(this.windPhase) * 4; // Đung đưa tối đa 4px
        const swayY = Math.cos(this.windPhase * 0.8) * 3;
        
        this.x = this.baseX + swayX;
        this.y = this.baseY + swayY;
        
        // Cập nhật vị trí Label theo hoa (với một độ trễ nhẹ)
        this.uiLabel.style.transform = `translate(-50%, ${swayY * 0.5}px) scale(${0.9 + this.size/this.maxSize*0.1})`;

        if (this.size < this.maxSize) {
            // Hiệu ứng Bloom mượt mà (Ease out)
            this.size += (this.maxSize - this.size) * 0.07;
            
            if (this.size > this.maxSize * 0.6) {
                this.uiLabel.style.opacity = (this.size - this.maxSize * 0.6) / (this.maxSize * 0.4);
                this.uiLabel.style.transition = 'opacity 0.5s ease';
            }
        }
    }
}

// Khởi tạo nền bụi vàng
for (let i = 0; i < 150; i++) particles.push(new Particle());

// Xử lý sự kiện mọc hoa
window.addEventListener('mousedown', (e) => {
    if (flowers.length < 17) {
        const currentData = data[flowers.length];
        const flower = new OrganicFlower(flowers.length, currentData);
        flowers.push(flower);
        
        updateSubtitle(currentData.wish);

        // Bắn ra CHÙM HẠT XOÁY đặc biệt tại vị trí click
        for(let i=0; i<25; i++) {
            let p = new Particle(e.clientX, e.clientY, true);
            p.vx = (Math.random() - 0.5) * 8; // Bắn nhanh hơn
            p.vy = (Math.random() - 0.5) * 8;
            p.wobbleSpeed = 0.1 + Math.random() * 0.1;
            particles.push(p);
        }
        document.getElementById('hint').style.opacity = 0;
    } else if (flowers.length === 17 && !isFinished) {
        showFinalDate();
        flowers.push({ isDummy: true });
        isFinished = true;
    }
});

function updateSubtitle(text) {
    wishSubtitle.style.opacity = 0;
    wishSubtitle.style.transform = 'translateY(10px)';
    
    // Đợi 0.3s để lời chúc cũ mờ hẳn rồi mới hiện lời chúc mới
    setTimeout(() => {
        wishSubtitle.innerText = text;
        wishSubtitle.style.transition = 'none';
        setTimeout(() => {
            wishSubtitle.style.transition = 'all 1.2s cubic-bezier(0.165, 0.84, 0.44, 1)';
            wishSubtitle.style.opacity = 1;
            wishSubtitle.style.transform = 'translateY(0)';
        }, 50);
    }, 300);
}

function showFinalDate() {
    wishSubtitle.style.opacity = 0; // Ẩn subtitle khi kết thúc
    const fd = document.getElementById('final-date');
    const fs = document.getElementById('final-sub');
    
    // Hiệu ứng "Bùng nổ" của ngày 12/9
    fd.style.transition = "all 5s cubic-bezier(0.19, 1, 0.22, 1)";
    fd.style.opacity = 1;
    fd.style.filter = "blur(0px)";
    
    setTimeout(() => {
        fs.style.opacity = 0.7;
        fs.style.transition = "opacity 3s ease";
    }, 2500);

    // Xóa bớt hạt nền để giảm tải và tập trung vào tâm
    if (particles.length > 200) particles.splice(0, particles.length - 200);
}

window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

function animate() {
    frame++;
    // Tinh chỉnh trail: giảm opacity nền để vết mờ (ghosting) rõ hơn khi hoa đung đưa
    ctx.fillStyle = 'rgba(5, 5, 8, 0.16)';
    ctx.fillRect(0, 0, width, height);

    particles.forEach((p, i) => {
        p.update();
        p.draw();
        // Xóa hạt chết mạnh mẽ hơn
        if (p.life <= 0 && particles.length > 150) particles.splice(i, 1);
    });

    flowers.forEach(f => {
        if (!f.isDummy) {
            f.update();
            f.draw();
        }
    });

    // Thêm hiệu ứng lấp lánh ngẫu nhiên toàn màn hình (Sparkle)
    if (frame % 8 === 0) {
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.arc(Math.random()*width, Math.random()*height, 0.6, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }

    requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
