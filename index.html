<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>8/3 Constellation</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#07040d;
overflow:hidden;
font-family:Montserrat;
color:white;
cursor:none;
}

canvas{
display:block;
}

#text{

position:fixed;
top:50%;
left:50%;

transform:translate(-50%,-50%);

font-size:40px;
font-weight:600;

opacity:0;

text-align:center;

pointer-events:none;

}

#cursor{

width:8px;
height:8px;

background:white;

border-radius:50%;

position:fixed;

pointer-events:none;

}

</style>
</head>

<body>

<canvas id="c"></canvas>
<div id="text"></div>
<div id="cursor"></div>

<script>

const canvas=document.getElementById("c")
const ctx=canvas.getContext("2d")

canvas.width=innerWidth
canvas.height=innerHeight

let mouse={x:0,y:0}

document.addEventListener("mousemove",e=>{

mouse.x=e.clientX
mouse.y=e.clientY

cursor.style.left=e.clientX+"px"
cursor.style.top=e.clientY+"px"

})

/* particle */

class Particle{

constructor(){

this.x=Math.random()*canvas.width
this.y=Math.random()*canvas.height

this.vx=(Math.random()-.5)*0.5
this.vy=(Math.random()-.5)*0.5

}

move(){

this.x+=this.vx
this.y+=this.vy

if(this.x<0||this.x>canvas.width)this.vx*=-1
if(this.y<0||this.y>canvas.height)this.vy*=-1

}

draw(){

ctx.fillStyle="white"

ctx.beginPath()
ctx.arc(this.x,this.y,1.6,0,Math.PI*2)
ctx.fill()

}

}

const particles=[]

for(let i=0;i<300;i++){

particles.push(new Particle())

}

/* connect lines */

function connect(){

for(let a=0;a<particles.length;a++){

for(let b=a;b<particles.length;b++){

let dx=particles[a].x-particles[b].x
let dy=particles[a].y-particles[b].y

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<90){

ctx.strokeStyle="rgba(255,180,230,"+(1-dist/90)+")"

ctx.beginPath()

ctx.moveTo(particles[a].x,particles[a].y)
ctx.lineTo(particles[b].x,particles[b].y)

ctx.stroke()

}

}

}

}

/* text morph */

const messages=[

"8 . 3",

"Happy Women's Day",

"To the amazing girls",

"in our class ✨"

]

let msgIndex=0

function showMessage(){

text.innerHTML=messages[msgIndex]

text.style.opacity=1

setTimeout(()=>{

text.style.opacity=0

msgIndex++

if(msgIndex<messages.length){

setTimeout(showMessage,1500)

}

},2500)

}

setTimeout(showMessage,4000)

/* animation */

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

p.move()
p.draw()

})

connect()

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
