<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>12/9 Eternal Bloom - Symphony of Light</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Montserrat:wght@200;400&family=Playfair+Display:italic@1&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcf7d;
            --pink: #ff85a2;
            --dark: #020204; /* Tối hơn để nổi bật hiệu ứng sáng */
        }

        body {
            margin: 0;
            background: var(--dark);
            color: #fff;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            user-select: none;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            /* Thêm filter để tăng độ tương phản và rực rỡ */
            filter: contrast(110%) brightness(110%) saturate(120%);
        }

        /* UI Layers */
        #ui-layer {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        /* Tên thành viên dưới mỗi bông hoa */
        .member-name {
            position: absolute;
            font-size: 10px; /* Nhỏ hơn chút để tinh tế */
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold);
            transform: translate(-50%, 0);
            opacity: 0;
            text-shadow: 0 0 15px rgba(255, 207, 125, 0.6);
            white-space: nowrap;
            transition: all 1s ease;
        }

        /* Phụ đề lời chúc phía dưới */
        #subtitle-container {
            position: fixed;
            bottom: 10vh; /* Cách đáy 10% chiều cao màn hình */
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            text-align: center;
            z-index: 20;
        }

        #wish-subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(16px, 2vw, 22px); /* Tự điều chỉnh kích thước */
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.8;
            opacity: 0;
            transform: translateY(30px);
            text-shadow: 0 2px 15px rgba(0,0,0,0.8);
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* Finale Elements */
        #center-piece {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .date-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(80px, 15vw, 160px);
            background: linear-gradient(to bottom, #fff 20%, var(--gold) 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            filter: blur(30px);
            margin: 0;
            text-shadow: 0 0 50px rgba(255, 207, 125, 0.3);
        }

        .subtitle-final {
            letter-spacing: 20px;
            font-size: 11px;
            color: var(--pink);
            opacity: 0;
            margin-top: -15px;
            text-transform: uppercase;
        }

        #hint {
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 9px;
            letter-spacing: 6px;
            opacity: 0.6;
            color: var(--gold);
            animation: pulseHint 2.5s infinite;
        }

        @keyframes pulseHint {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui-layer">
    <div id="labels-container"></div>
    
    <div id="subtitle-container">
        <div id="wish-subtitle"></div>
    </div>

    <div id="center-piece">
        <h1 id="final-date" class="date-title">12/9</h1>
        <p id="final-sub" class="subtitle-final">ALWAYS TOGETHER</p>
    </div>
</div>

<div id="hint">CLICK TO AWAKEN THE LIGHT</div>

<script>
/**
 * THE 12/9 SYMPHONY - ADVANCED EFFECTS VERSION
 * Tích hợp Noise Physics, Composite Blooming, và Particle Memories
 */

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const labelsContainer = document.getElementById('labels-container');
const wishSubtitle = document.getElementById('wish-subtitle');

let width, height, centerX, centerY;
let particles = [];
let flowers = [];
let frame = 0;
let mouse = { x: -1000, y: -1000 };
let isFinale = false;

const data = [
    { name: "Huyền My", wish: "Mong nụ cười của bạn luôn rạng rỡ như đóa hướng dương đón nắng." },
    { name: "Linh Đan", wish: "Chúc bạn luôn giữ được sự dịu dàng và tâm hồn an yên giữa cuộc sống." },
    { name: "Minh Tú", wish: "Hãy tỏa sáng theo cách riêng của bạn, vì bạn là phiên bản duy nhất." },
    { name: "Thanh Trúc", wish: "Chúc bạn mỗi ngày đều là một bản nhạc ngọt ngào và đầy cảm hứng." },
    { name: "Phương Nghi", wish: "Mong những điều tốt đẹp nhất sẽ luôn tìm đến với cô gái kiên cường." },
    { name: "Gia Hân", wish: "Chúc bạn luôn hạnh phúc và gặt hái được nhiều thành công trên con đường đã chọn." },
    { name: "Tuệ Lâm", wish: "Sự thông tuệ và bản lĩnh của bạn luôn là nguồn năng lượng tích cực cho mọi người." },
    { name: "Quỳnh Chi", wish: "Chúc bạn mãi xinh đẹp và tỏa hương thơm ngát như loài hoa Quỳnh." },
    { name: "Bảo Ngọc", wish: "Bạn là viên ngọc quý, hãy luôn tự tin và trân trọng bản thân mình nhé." },
    { name: "Ánh Dương", wish: "Chúc bạn luôn mang theo hơi ấm và ánh sáng đến mọi nơi bạn đi qua." },
    { name: "Khả Ái", wish: "Mong thế giới này luôn dịu dàng với một người đáng yêu như bạn." },
    { name: "Mai Anh", wish: "Chúc bạn một thanh xuân rực rỡ và không hối tiếc với những đam mê." },
    { name: "Ngọc Diệp", wish: "Như lá ngọc cành vàng, chúc bạn luôn thanh cao và tràn đầy sức sống." },
    { name: "Thảo Vy", wish: "Mong những giấc mơ của bạn sẽ sớm trở thành hiện thực tươi đẹp." },
    { name: "Yến Nhi", wish: "Hãy luôn là chú chim nhỏ tự do, sải cánh bay giữa bầu trời của riêng mình." },
    { name: "Tố Uyên", wish: "Chúc bạn tìm thấy niềm vui trong từng điều nhỏ nhặt nhất của cuộc sống." },
    { name: "Diễm Quỳnh", wish: "Vẻ đẹp của bạn không chỉ ở vẻ ngoài mà còn ở trái tim ấm áp." }
];

// Hàm Simplex Noise đơn giản để tạo chuyển động hữu cơ
const noise = (function() {
    const p = new Uint8Array(512);
    for (let i = 0; i < 512; i++) p[i] = i & 255;
    for (let i = 0; i < 255; i++) {
        const r = (Math.random() * (256 - i) | 0) + i;
        const tmp = p[i]; p[i] = p[r]; p[r] = tmp;
        p[i + 256] = p[i];
    }
    function grad(hash, x) {
        return (hash & 1) === 0 ? x : -x;
    }
    return function(x) {
        const X = (x | 0) & 255;
        x -= x | 0;
        const u = x * x * x * (x * (x * 6 - 15) + 10);
        return (grad(p[X], x) * (1 - u) + grad(p[X + 1], x - 1) * u) * 2;
    }
})();

function init() {
    width = window.innerWidth;
    height = window.innerHeight;
    centerX = width / 2;
    centerY = height / 2;
    canvas.width = width;
    canvas.height = height;
}

window.addEventListener('resize', init);
init();

// --- Hệ thống bụi vàng hữu cơ (Noise Particles) ---
class Particle {
    constructor(x, y, isSpecial = false, isMemory = false) {
        this.isMemory = isMemory;
        this.reset(x, y, isSpecial);
    }
    reset(x, y, isSpecial) {
        this.x = x || Math.random() * width;
        this.y = y || Math.random() * height;
        // Sử dụng Noise để quyết định vận tốc ban đầu
        const nFactor = noise(this.x * 0.005 + frame * 0.01);
        this.vx = (Math.random() - 0.5) * 0.5 + nFactor * 0.2;
        this.vy = (Math.random() - 0.5) * 0.5 - Math.random() * 0.3; // Xu hướng bay lên nhẹ
        this.life = isSpecial ? 1 + Math.random() * 0.5 : 1;
        this.decay = isSpecial ? 0.015 : Math.random() * 0.004 + 0.001;
        this.size = isSpecial ? Math.random() * 4 + 1.5 : Math.random() * 1.5;
        this.baseSize = this.size;
        
        if (this.isMemory) {
            this.color = '#fff';
            this.decay = 0.005;
            this.vx *= 2;
            this.vy -= 1; // Bay lên nhanh hơn
        } else {
            this.color = isSpecial ? '#ffcf7d' : (Math.random() > 0.6 ? '#ff85a2' : '#fff');
        }
        this.angle = Math.random() * Math.PI * 2;
    }
    update() {
        // Áp dụng Noise Physics để tạo chuyển động lơ lửng
        if (!isFinale && !this.isMemory) {
            const force = noise(this.x * 0.002 + frame * 0.001) * 0.1;
            this.vx += Math.cos(this.angle) * force;
            this.vy += Math.sin(this.angle) * force;
            this.angle += 0.02;
        } else if (isFinale) {
            // Hút mạnh về tâm
            this.vx += (centerX - this.x) * 0.001;
            this.vy += (centerY - this.y) * 0.001;
        }

        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
        this.size = this.baseSize * this.life; // Hạt nhỏ dần

        if (this.life <= 0 && !this.isMemory) this.reset();
    }
    draw() {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        
        // Hiệu ứng phát sáng mạnh (Bloom)
        if (this.size > 1.2 || this.isMemory) {
            ctx.shadowBlur = 15 * this.life;
            ctx.shadowColor = this.color;
        }
        
        ctx.beginPath();
        if (this.size > 2) {
            // Vẽ hình ngôi sao nhỏ cho hạt lớn
            for(let i=0; i<5; i++) {
                const a = (i/5) * Math.PI*2 - Math.PI/2;
                const r = this.size;
                ctx.lineTo(this.x + Math.cos(a)*r, this.y + Math.sin(a)*r);
                const a2 = a + Math.PI/5;
                const r2 = r*0.4;
                ctx.lineTo(this.x + Math.cos(a2)*r2, this.y + Math.sin(a2)*r2);
            }
        } else {
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        }
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

// --- Hệ thống Hoa Hữu Cơ (Organic Bloom) ---
class OrganicFlower {
    constructor(index, person) {
        this.index = index;
        this.name = person.name;
        
        const radius = Math.min(width, height) * 0.36;
        const angle = (index / 17) * Math.PI * 2 - Math.PI/2;
        this.x = centerX + Math.cos(angle) * radius;
        this.y = centerY + Math.sin(angle) * radius;

        this.size = 0;
        this.maxSize = 45 + Math.random() * 25;
        this.hue = 335 + (index * 3);
        this.petals = 7 + Math.floor(Math.random() * 3);
        this.points = [];
        this.wobblePhase = Math.random() * Math.PI * 2;
        this.initFlower();
        this.createLabel();
    }

    initFlower() {
        for (let i = 0; i < this.petals; i++) {
            this.points.push({
                rot: (i / this.petals) * Math.PI * 2,
                len: 1.2 + Math.random() * 0.5,
                curveFactor: 0.6 + Math.random() * 0.3
            });
        }
    }

    createLabel() {
        const label = document.createElement('div');
        label.className = 'member-name';
        label.innerText = this.name;
        label.style.left = `${this.x}px`;
        label.style.top = `${this.y + 70}px`;
        labelsContainer.appendChild(label);
        this.uiLabel = label;
    }

    draw() {
        if (this.size < 0.1) return;
        ctx.save();
        ctx.translate(this.x, this.y);
        // Hoa đung đưa nhẹ (Wobble)
        ctx.rotate(frame * 0.003 + Math.sin(frame * 0.02 + this.wobblePhase) * 0.05);

        // Hiệu ứng Bloom cộng hưởng
        ctx.globalCompositeOperation = 'lighter';

        this.points.forEach(p => {
            ctx.save();
            ctx.rotate(p.rot);
            const curSize = this.size * p.len;
            const grad = ctx.createLinearGradient(0, 0, 0, curSize);
            grad.addColorStop(0, `hsla(${this.hue}, 100%, 90%, 0.9)`);
            grad.addColorStop(0.4, `hsla(${this.hue + 15}, 90%, 70%, 0.6)`);
            grad.addColorStop(1, `hsla(${this.hue + 30}, 60%, 40%, 0)`);

            ctx.fillStyle = grad;
            ctx.shadowBlur = 20 * (this.size / this.maxSize);
            ctx.shadowColor = grad;

            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(this.size * p.curveFactor, curSize * 0.4, this.size * 0.4, curSize, 0, curSize);
            ctx.bezierCurveTo(-this.size * 0.4, curSize, -this.size * p.curveFactor, curSize * 0.4, 0, 0);
            ctx.fill();
            ctx.restore();
        });

        // Nhụy hoa rực rỡ
        ctx.beginPath();
        ctx.arc(0, 0, this.size/4.5, 0, Math.PI * 2);
        ctx.fillStyle = "#fff";
        ctx.shadowBlur = 30;
        ctx.shadowColor = "#ffd700";
        ctx.fill();
        
        ctx.restore();
        ctx.globalCompositeOperation = 'source-over'; // Reset
    }

    update() {
        if (this.size < this.maxSize) {
            this.size += (this.maxSize - this.size) * 0.06;
            if (this.size > this.maxSize * 0.75) {
                this.uiLabel.style.opacity = 1;
                this.uiLabel.style.transform = 'translate(-50%, -10px)'; // Trồi lên nhẹ
            }
        }
    }
}

// Khởi tạo nền bụi vàng
for (let i = 0; i < 180; i++) particles.push(new Particle());

window.addEventListener('mousedown', (e) => {
    if (flowers.length < 17) {
        const currentData = data[flowers.length];
        const flower = new OrganicFlower(flowers.length, currentData);
        flowers.push(flower);
        
        updateSubtitle(currentData.wish);

        // Hiệu ứng pháo hoa khi click (Special particles)
        for(let i=0; i<25; i++) {
            particles.push(new Particle(e.clientX, e.clientY, true));
        }
        document.getElementById('hint').style.display = 'none';
    } else if (flowers.length === 17 && !isFinale) {
        showFinalDate();
        flowers.push({ isDummy: true });
    }
});

function updateSubtitle(text) {
    // Biến phụ đề cũ thành hạt ký ức (Memory particles)
    if (wishSubtitle.innerText !== "") {
        const rect = wishSubtitle.getBoundingClientRect();
        for(let i=0; i<20; i++) {
            const px = rect.left + Math.random() * rect.width;
            const py = rect.top + Math.random() * rect.height;
            particles.push(new Particle(px, py, false, true)); // isMemory = true
        }
    }

    wishSubtitle.style.opacity = 0;
    wishSubtitle.style.transform = 'translateY(20px) blur(5px)';
    
    setTimeout(() => {
        wishSubtitle.innerText = text;
        wishSubtitle.style.opacity = 1;
        wishSubtitle.style.transform = 'translateY(0) blur(0)';
    }, 600);
}

function showFinalDate() {
    isFinale = true;
    wishSubtitle.style.opacity = 0; // Ẩn subtitle khi kết thúc
    const fd = document.getElementById('final-date');
    const fs = document.getElementById('final-sub');
    
    // Tăng tốc độ bay của hạt hiện có
    particles.forEach(p => {
        p.vx *= 3; p.vy *= 3; p.decay = 0.001;
    });

    fd.style.transition = "all 5s cubic-bezier(0.19, 1, 0.22, 1)";
    fd.style.opacity = 1;
    fd.style.filter = "blur(0px)";
    
    setTimeout(() => {
        fs.style.opacity = 0.9;
        fs.style.transition = "opacity 3s ease, letter-spacing 3s ease";
        fs.style.letter-spacing = '15px';
    }, 2500);

    // Xóa bớt label tên để trung tâm nổi bật
    document.querySelectorAll('.member-name').forEach(el => el.style.opacity = 0.2);
}

window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

function animate() {
    frame++;
    // Nền tối với trail mờ mượt mà
    ctx.fillStyle = 'rgba(2, 2, 4, 0.22)';
    ctx.fillRect(0, 0, width, height);

    particles.forEach((p, i) => {
        p.update();
        p.draw();
        // Xóa hạt ký ức khi hết đời
        if (p.isMemory && p.life <= 0) particles.splice(i, 1);
    });

    // Vẽ hoa (sau hạt để đè lên hạt)
    flowers.forEach(f => {
        if (!f.isDummy) {
            f.update();
            f.draw();
        }
    });

    requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
