<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Ethereal Bloom 12/9</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400&family=Playfair+Display:italic@1&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #030305;
            color: #fff;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            user-select: none;
        }

        canvas {
            display: block;
            filter: contrast(110%) brightness(110%);
        }

        #ui {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
        }

        .name-label {
            position: absolute;
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
            transform: translate(-50%, -50%);
            white-space: nowrap;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0 0 10px rgba(255, 182, 193, 0.5);
        }

        .final-date {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Playfair Display', serif;
            font-size: 120px;
            font-style: italic;
            background: linear-gradient(45deg, #fff, #ffd700, #ff85a2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            filter: blur(10px);
        }

        #guide {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 200;
            font-size: 10px;
            letter-spacing: 5px;
            opacity: 0.4;
        }
    </style>
</head>
<body>

<div id="ui">
    <div id="labels"></div>
    <div id="final-date" class="final-date">12 / 9</div>
</div>
<div id="guide">TAP TO AWAKEN THE SOUL OF 17</div>
<canvas id="canvas"></canvas>

<script>
/**
 * ETHEREAL BLOOM SYSTEM
 * Một hệ thống Generative Art sử dụng toán học Fractal và Particle Physics
 */

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const finalDate = document.getElementById('final-date');
const labelsContainer = document.getElementById('labels');

let width, height, centerX, centerY;
let particles = [];
let flowers = [];
let frame = 0;
let mouse = { x: -1000, y: -1000, active: false };

// Danh sách 17 thành viên
const members = [
    "Huyền My", "Linh Đan", "Minh Tú", "Thanh Trúc", "Phương Nghi",
    "Gia Hân", "Tuệ Lâm", "Quỳnh Chi", "Bảo Ngọc", "Ánh Dương",
    "Khả ái", "Mai Anh", "Ngọc Diệp", "Thảo Vy", "Yến Nhi",
    "Tố Uyên", "Diễm Quỳnh"
];

function init() {
    width = window.innerWidth;
    height = window.innerHeight;
    centerX = width / 2;
    centerY = height / 2;
    canvas.width = width;
    canvas.height = height;
}

window.addEventListener('resize', init);
init();

// --- Lớp vật lý các điểm sáng trôi nổi ---
class GlowParticle {
    constructor() {
        this.reset();
    }
    reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.size = Math.random() * 1.5;
        this.alpha = Math.random() * 0.5;
        this.hue = Math.random() > 0.5 ? 340 : 40;
    }
    update() {
        // Tác động của chuột (Fluid effect)
        let dx = mouse.x - this.x;
        let dy = mouse.y - this.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 200) {
            let angle = Math.atan2(dy, dx);
            this.vx -= Math.cos(angle) * 0.02;
            this.vy -= Math.sin(angle) * 0.02;
        }

        this.x += this.vx;
        this.y += this.vy;
        
        if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) this.reset();
    }
    draw() {
        ctx.fillStyle = `hsla(${this.hue}, 100%, 80%, ${this.alpha})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

// --- Lớp hoa nghệ thuật ---
class EtherealFlower {
    constructor(index, name) {
        this.index = index;
        this.name = name;
        this.isFinal = false;
        
        // Sắp xếp theo vòng tròn đa giác
        const total = 17;
        const radius = Math.min(width, height) * 0.32;
        const angle = (index / total) * Math.PI * 2 - Math.PI / 2;
        
        this.targetX = centerX + Math.cos(angle) * radius;
        this.targetY = centerY + Math.sin(angle) * radius;
        
        this.x = this.targetX;
        this.y = this.targetY;
        
        this.bloom = 0;
        this.hue = 330 + (index * 5);
        this.rotation = Math.random() * Math.PI;
        this.petals = [];
        this.initPetals();
        this.createLabel();
    }

    initPetals() {
        const petalCount = 8;
        for (let i = 0; i < petalCount; i++) {
            this.petals.push({
                angle: (i / petalCount) * Math.PI * 2,
                length: 40 + Math.random() * 30,
                width: 15 + Math.random() * 10,
                curve: 0.5 + Math.random() * 0.5
            });
        }
    }

    createLabel() {
        const label = document.createElement('div');
        label.className = 'name-label';
        label.innerText = this.name;
        label.style.left = `${this.x}px`;
        label.style.top = `${this.y + 60}px`;
        labelsContainer.appendChild(label);
        this.domLabel = label;
    }

    draw() {
        if (this.bloom <= 0.01) return;

        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation + Math.sin(frame * 0.01) * 0.1);

        // Vẽ từng cánh hoa bằng kỹ thuật shadow blur để tạo độ nhòe nghệ thuật
        this.petals.forEach((p, i) => {
            ctx.save();
            ctx.rotate(p.angle);
            
            const curLen = p.length * this.bloom;
            const curWid = p.width * this.bloom;

            const grad = ctx.createLinearGradient(0, 0, 0, curLen);
            grad.addColorStop(0, `hsla(${this.hue}, 90%, 85%, ${0.6 * this.bloom})`);
            grad.addColorStop(1, `hsla(${this.hue + 20}, 70%, 50%, 0)`);

            ctx.fillStyle = grad;
            ctx.shadowBlur = 15 * this.bloom;
            ctx.shadowColor = `hsla(${this.hue}, 100%, 70%, 0.5)`;

            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(curWid, curLen * 0.3, curWid, curLen * 0.7, 0, curLen);
            ctx.bezierCurveTo(-curWid, curLen * 0.7, -curWid, curLen * 0.3, 0, 0);
            ctx.fill();
            ctx.restore();
        });

        // Nhụy hoa rực sáng
        ctx.beginPath();
        ctx.arc(0, 0, 4 * this.bloom, 0, Math.PI * 2);
        ctx.fillStyle = "#fff";
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#fff";
        ctx.fill();

        ctx.restore();
        
        // Cập nhật label DOM
        this.domLabel.style.opacity = this.bloom;
        this.domLabel.style.transform = `translate(-50%, -50%) scale(${0.5 + this.bloom * 0.5})`;
    }

    update() {
        if (this.bloom < 1) this.bloom += 0.015;
        this.rotation += 0.002;
    }
}

// --- Khởi tạo 200 hạt sáng nền ---
for (let i = 0; i < 200; i++) particles.push(new GlowParticle());

// --- Xử lý sự kiện chính ---
window.addEventListener('mousedown', (e) => {
    if (flowers.length < 17) {
        const nextName = members[flowers.length];
        const flower = new EtherealFlower(flowers.length, nextName);
        flowers.push(flower);
        
        // Ẩn hướng dẫn
        if (flowers.length === 1) document.getElementById('guide').style.opacity = 0;

        // Bắn pháo hoa li ti tại chỗ mọc
        for(let i=0; i<30; i++) {
            let p = new GlowParticle();
            p.x = e.clientX;
            p.y = e.clientY;
            p.vx = (Math.random() - 0.5) * 10;
            p.vy = (Math.random() - 0.5) * 10;
            particles.push(p);
        }
    } else if (flowers.length === 17) {
        // Kích hoạt Bông hoa Cuối cùng (12/9)
        triggerFinalEvent();
        flowers.push({ isFinal: true }); // Flag để không chạy tiếp
    }
});

function triggerFinalEvent() {
    // Hiệu ứng hút hạt vào tâm
    particles.forEach(p => {
        let dx = centerX - p.x;
        let dy = centerY - p.y;
        let angle = Math.atan2(dy, dx);
        p.vx = Math.cos(angle) * 15;
        p.vy = Math.sin(angle) * 15;
    });

    // Hiện 12/9
    setTimeout(() => {
        finalDate.style.opacity = 1;
        finalDate.style.filter = "blur(0px)";
        finalDate.style.transition = "all 3s ease";
        
        // Rung chuyển màn hình nhẹ
        document.body.style.animation = "shake 0.5s ease-in-out";
    }, 500);
}

// Cập nhật tọa độ chuột
window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

function animate() {
    frame++;
    // Vẽ nền mờ để tạo trail
    ctx.fillStyle = 'rgba(3, 3, 5, 0.15)';
    ctx.fillRect(0, 0, width, height);

    // Vẽ hạt sáng
    particles.forEach(p => {
        p.update();
        p.draw();
    });

    // Vẽ hoa
    flowers.forEach(f => {
        if (!f.isFinal) {
            f.update();
            f.draw();
        }
    });

    // Tạo hiệu ứng lấp lánh ngẫu nhiên
    if (frame % 10 === 0) {
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(Math.random()*width, Math.random()*height, 0.5, 0, Math.PI*2);
        ctx.fill();
    }

    requestAnimationFrame(animate);
}

animate();

// CSS Shake Animation cho Finale
const style = document.createElement('style');
style.innerHTML = `
    @keyframes shake {
        0% { transform: translate(1px, 1px) rotate(0deg); }
        20% { transform: translate(-3px, 0px) rotate(1deg); }
        40% { transform: translate(3px, 2px) rotate(0deg); }
        60% { transform: translate(-3px, 1px) rotate(-1deg); }
        80% { transform: translate(-1px, -1px) rotate(1deg); }
        100% { transform: translate(1px, -2px) rotate(0deg); }
    }
`;
document.head.appendChild(style);

</script>
</body>
</html>
