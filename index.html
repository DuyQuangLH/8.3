<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>12/9 Eternal Symphony - Luminance Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400&family=Playfair+Display:italic@1&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcf7d;
            --pink: #ff85a2;
            --dark: #030306; /* Tối hơn chút để nổi bật hiệu ứng nền */
            --sub-white: rgba(255, 255, 255, 0.9);
        }

        body {
            margin: 0;
            background: var(--dark);
            color: #fff;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            user-select: none;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            /* Thêm chút blur nhẹ cho nền để tạo hiệu ứng 'mặt nước' */
            filter: contrast(110%) brightness(105%);
        }

        /* UI Layers */
        #ui-layer {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        /* Tên thành viên */
        .member-name {
            position: absolute;
            font-size: 10px; /* Nhỏ hơn chút cho tinh tế */
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold);
            transform: translate(-50%, 0);
            opacity: 0;
            text-shadow: 0 0 15px rgba(255, 207, 125, 0.6);
            white-space: nowrap;
            transition: opacity 1.5s ease, transform 1s ease;
        }

        /* Phụ đề lời chúc */
        #subtitle-container {
            position: fixed;
            bottom: clamp(60px, 8vh, 100px); /* Tự động điều chỉnh độ cao */
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 800px;
            text-align: center;
            z-index: 20;
        }

        #wish-subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(16px, 2vw, 20px); /* Responsive font size */
            color: var(--sub-white);
            line-height: 1.7;
            opacity: 0;
            transform: translateY(20px);
            text-shadow: 0 2px 15px rgba(0,0,0,0.7);
            /* Tạo background mờ nhẹ cho chữ dễ đọc */
            background: radial-gradient(circle, rgba(0,0,0,0.5) 0%, transparent 70%);
            padding: 10px 20px;
        }

        /* Finale Elements */
        #center-piece {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .date-title {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: clamp(80px, 15vw, 150px);
            background: linear-gradient(to bottom, #fff, var(--gold), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            filter: blur(25px);
            margin: 0;
            /* Hiệu ứng thở (Breathing) */
            animation: breatheTitle 10s infinite 3s;
        }

        .subtitle-final {
            letter-spacing: 18px;
            font-size: clamp(8px, 1.2vw, 12px);
            color: var(--pink);
            opacity: 0;
            margin-top: -15px;
            text-shadow: 0 0 10px var(--pink);
        }

        #hint {
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 9px;
            letter-spacing: 6px;
            opacity: 0.5;
            color: var(--gold);
            animation: hintPulse 3s infinite;
        }

        /* Keyframes */
        @keyframes breatheTitle {
            0%, 100% { transform: scale(1); filter: blur(0px) drop-shadow(0 0 20px var(--gold)); }
            50% { transform: scale(1.03); filter: blur(0px) drop-shadow(0 0 40px var(--pink)); }
        }

        @keyframes hintPulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui-layer">
    <div id="labels-container"></div>
    
    <div id="subtitle-container">
        <div id="wish-subtitle"></div>
    </div>

    <div id="center-piece">
        <h1 id="final-date" class="date-title">12/9</h1>
        <p id="final-sub" class="subtitle-final">ALWAYS TOGETHER</p>
    </div>
</div>

<div id="hint">CHẠM NHẸ ĐỂ KHỞI ĐẦU SYMPHONY</div>

<script>
/**
 * THE 12/9 SYMPHONY - LUMINANCE EDITION
 * Tập trung vào hiệu ứng ánh sáng và tương tác
 */

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const labelsContainer = document.getElementById('labels-container');
const wishSubtitle = document.getElementById('wish-subtitle');

let width, height, centerX, centerY;
let particles = [];
let flowers = [];
let caustics = []; // Hiệu ứng quầng sáng nền
let frame = 0;
let mouse = { x: -1000, y: -1000 };

const data = [
    { name: "Huyền My", wish: "Mong nụ cười của bạn luôn rạng rỡ như đóa hướng dương đón nắng." },
    { name: "Linh Đan", wish: "Chúc bạn luôn giữ được sự dịu dàng và tâm hồn an yên giữa cuộc sống." },
    { name: "Minh Tú", wish: "Hãy tỏa sáng theo cách riêng của bạn, vì bạn là phiên bản duy nhất." },
    { name: "Thanh Trúc", wish: "Chúc bạn mỗi ngày đều là một bản nhạc ngọt ngào và đầy cảm hứng." },
    { name: "Phương Nghi", wish: "Mong những điều tốt đẹp nhất sẽ luôn tìm đến với cô gái kiên cường." },
    { name: "Gia Hân", wish: "Chúc bạn luôn hạnh phúc và gặt hái được nhiều thành công trên con đường đã chọn." },
    { name: "Tuệ Lâm", wish: "Sự thông tuệ và bản lĩnh của bạn luôn là nguồn năng lượng tích cực cho mọi người." },
    { name: "Quỳnh Chi", wish: "Chúc bạn mãi xinh đẹp và tỏa hương thơm ngát như loài hoa Quỳnh." },
    { name: "Bảo Ngọc", wish: "Bạn là viên ngọc quý, hãy luôn tự tin và trân trọng bản thân mình nhé." },
    { name: "Ánh Dương", wish: "Chúc bạn luôn mang theo hơi ấm và ánh sáng đến mọi nơi bạn đi qua." },
    { name: "Khả Ái", wish: "Mong thế giới này luôn dịu dàng với một người đáng yêu như bạn." },
    { name: "Mai Anh", wish: "Chúc bạn một thanh xuân rực rỡ và không hối tiếc với những đam mê." },
    { name: "Ngọc Diệp", wish: "Như lá ngọc cành vàng, chúc bạn luôn thanh cao và tràn đầy sức sống." },
    { name: "Thảo Vy", wish: "Mong những giấc mơ của bạn sẽ sớm trở thành hiện thực tươi đẹp." },
    { name: "Yến Nhi", wish: "Hãy luôn là chú chim nhỏ tự do, sải cánh bay giữa bầu trời của riêng mình." },
    { name: "Tố Uyên", wish: "Chúc bạn tìm thấy niềm vui trong từng điều nhỏ nhặt nhất của cuộc sống." },
    { name: "Diễm Quỳnh", wish: "Vẻ đẹp của bạn không chỉ ở vẻ ngoài mà còn ở trái tim ấm áp." }
];

function init() {
    width = window.innerWidth;
    height = window.innerHeight;
    centerX = width / 2;
    centerY = height / 2;
    canvas.width = width;
    canvas.height = height;

    // Khởi tạo 5 quầng sáng nền
    caustics = [];
    for(let i=0; i<5; i++) {
        caustics.push({
            x: Math.random() * width,
            y: Math.random() * height,
            r: 200 + Math.random() * 300,
            vx: (Math.random() - 0.5) * 0.2,
            vy: (Math.random() - 0.5) * 0.2,
            opacity: 0.03 + Math.random() * 0.04
        });
    }
}

window.addEventListener('resize', init);
init();

// --- Hệ thống bụi vàng tương tác (Interactive Fairy Dust) ---
class Particle {
    constructor(x, y, isSpecial = false) {
        this.isSpecial = isSpecial;
        this.reset(x, y, isSpecial);
    }
    reset(x, y, isSpecial) {
        this.x = x || Math.random() * width;
        this.y = y || Math.random() * height;
        this.vx = (Math.random() - 0.5) * 0.8;
        this.vy = (Math.random() - 0.5) * 0.8;
        this.life = 1;
        this.decay = Math.random() * 0.005 + 0.003;
        // Bụi click to hơn và sáng hơn
        this.size = isSpecial ? Math.random() * 2.5 + 1.5 : Math.random() * 1.3;
        this.color = isSpecial ? '#ffcf7d' : (Math.random() > 0.6 ? '#ff85a2' : '#fff');
    }
    update() {
        // Tương tác vật lý: Bị chuột 'đẩy' ra xa
        let dx = this.x - mouse.x;
        let dy = this.y - mouse.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 130 && mouse.x > 0) {
            let force = (130 - dist) / 130;
            let angle = Math.atan2(dy, dx);
            this.vx += Math.cos(angle) * force * 0.06;
            this.vy += Math.sin(angle) * force * 0.06;
        }

        this.x += this.vx;
        this.y += this.vy;
        
        // Thêm lực ma sát nhẹ
        this.vx *= 0.99;
        this.vy *= 0.99;

        this.life -= this.decay;
        if (this.life <= 0) {
            if (this.isSpecial) particles.splice(particles.indexOf(this), 1); // Bụi click biến mất
            else this.reset(); // Bụi nền reset
        }
    }
    draw() {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        
        if (this.isSpecial) {
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
        }
        
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

// --- Hệ thống Hoa H huyền ảo ---
class EtherealFlower {
    constructor(index, person) {
        this.index = index;
        this.name = person.name;
        
        const radius = Math.min(width, height) * 0.35;
        const angle = (index / 17) * Math.PI * 2 - Math.PI/2;
        this.x = centerX + Math.cos(angle) * radius;
        this.y = centerY + Math.sin(angle) * radius;

        this.size = 0;
        this.maxSize = 42 + Math.random() * 18;
        this.hue = 330 + (index * 4);
        this.petals = 7 + Math.floor(Math.random() * 3);
        this.points = [];
        this.wobblePhase = Math.random() * Math.PI * 2;
        this.initFlower();
        this.createLabel();
    }

    initFlower() {
        for (let i = 0; i < this.petals; i++) {
            this.points.push({
                rot: (i / this.petals) * Math.PI * 2,
                len: 1.2 + Math.random() * 0.3,
                curve: 0.6 + Math.random() * 0.3
            });
        }
    }

    createLabel() {
        const label = document.createElement('div');
        label.className = 'member-name';
        label.innerText = this.name;
        label.style.left = `${this.x}px`;
        label.style.top = `${this.y + 65}px`;
        labelsContainer.appendChild(label);
        this.uiLabel = label;
    }

    draw() {
        if (this.size < 0.1) return;
        ctx.save();
        ctx.translate(this.x, this.y);
        // Hoa đung đưa nhẹ theo nhịp
        ctx.rotate(frame * 0.005 + Math.sin(frame * 0.02 + this.wobblePhase) * 0.05);

        // Vẽ lớp cánh hoa chính (Lấp lánh)
        this.points.forEach(p => {
            ctx.save();
            ctx.rotate(p.rot);
            
            const grad = ctx.createLinearGradient(0, 0, 0, this.size * p.len);
            grad.addColorStop(0, `hsla(${this.hue}, 100%, 88%, 0.9)`); // Sáng hơn chút
            grad.addColorStop(0.5, `hsla(${this.hue + 15}, 80%, 60%, 0.4)`);
            grad.addColorStop(1, `hsla(${this.hue + 30}, 60%, 40%, 0)`);

            ctx.fillStyle = grad;
            
            // Viền cánh hoa bắt sáng (Gold Highlight)
            if (this.size > this.maxSize * 0.9 && Math.random() > 0.92) {
                ctx.shadowBlur = 10;
                ctx.shadowColor = varColors.gold;
                ctx.strokeStyle = `rgba(255, 207, 125, ${0.4 + Math.random()*0.4})`;
                ctx.lineWidth = 0.5;
            } else {
                ctx.strokeStyle = 'transparent';
            }

            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(this.size * p.curve, this.size * 0.5, this.size * 0.5, this.size * p.len, 0, this.size * p.len);
            ctx.bezierCurveTo(-this.size * 0.5, this.size * p.len, -this.size * p.curve, this.size * 0.5, 0, 0);
            ctx.fill();
            ctx.stroke(); // Vẽ viền bắt sáng
            ctx.restore();
        });

        // Nhụy hoa rực sáng
        ctx.beginPath();
        ctx.arc(0, 0, this.size/5, 0, Math.PI * 2);
        ctx.fillStyle = "#fff";
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#fff";
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.restore();
    }

    update() {
        if (this.size < this.maxSize) {
            this.size += (this.maxSize - this.size) * 0.07;
            if (this.size > this.maxSize * 0.7) {
                this.uiLabel.style.opacity = 1;
                this.uiLabel.style.transform = 'translate(-50%, -5px)'; // Hiệu ứng trồi lên nhẹ
            }
        }
    }
}

// Khởi tạo nền
for (let i = 0; i < 150; i++) particles.push(new Particle());
// Lấy giá trị màu CSS
const varColors = {
    gold: getComputedStyle(document.documentElement).getPropertyValue('--gold'),
    pink: getComputedStyle(document.documentElement).getPropertyValue('--pink')
};

window.addEventListener('mousedown', (e) => {
    if (flowers.length < 17) {
        const currentData = data[flowers.length];
        const flower = new EtherealFlower(flowers.length, currentData);
        flowers.push(flower);
        updateSubtitle(currentData.wish);

        // Nổ bụi click
        for(let i=0; i<25; i++) {
            particles.push(new Particle(e.clientX, e.clientY, true));
        }
        document.getElementById('hint').style.opacity = 0;
    } else if (flowers.length === 17) {
        showFinalDate();
        flowers.push({ isDummy: true });
    }
});

function updateSubtitle(text) {
    wishSubtitle.style.opacity = 0;
    wishSubtitle.style.transform = 'translateY(15px)';
    
    setTimeout(() => {
        wishSubtitle.innerText = text;
        wishSubtitle.style.transition = 'none';
        setTimeout(() => {
            wishSubtitle.style.transition = 'all 1.2s cubic-bezier(0.19, 1, 0.22, 1)';
            wishSubtitle.style.opacity = 1;
            wishSubtitle.style.transform = 'translateY(0)';
        }, 50);
    }, 450);
}

function showFinalDate() {
    wishSubtitle.style.opacity = 0;
    const fd = document.getElementById('final-date');
    const fs = document.getElementById('final-sub');
    fd.style.transition = "all 5s cubic-bezier(0.19, 1, 0.22, 1)";
    fd.style.opacity = 1;
    fd.style.filter = "blur(0px)";
    setTimeout(() => {
        fs.style.opacity = 0.7;
        fs.style.transition = "opacity 2.5s ease";
    }, 2500);
    // Hút toàn bộ hạt về tâm
    particles.forEach(p => {
        p.vx = (centerX - p.x) * 0.04;
        p.vy = (centerY - p.y) * 0.04;
        p.decay = 0.0015;
    });
}

window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

function animate() {
    frame++;
    // Vẽ nền mờ Trail Effect
    ctx.globalAlpha = 1;
    ctx.fillStyle = 'rgba(3, 3, 6, 0.2)';
    ctx.fillRect(0, 0, width, height);

    // Vẽ hiệu ứng quầng sáng nền (Mặt nước)
    ctx.globalCompositeOperation = 'lighter'; // Tạo hiệu ứng cộng sáng
    caustics.forEach(c => {
        c.x += c.vx;
        c.y += c.vy;
        if(c.x < 0 || c.x > width) c.vx *= -1;
        if(c.y < 0 || c.y > height) c.vy *= -1;
        
        ctx.globalAlpha = c.opacity;
        let grad = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, c.r);
        grad.addColorStop(0, '#fff');
        grad.addColorStop(0.3, varColors.gold);
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, Math.PI*2);
        ctx.fill();
    });
    ctx.globalCompositeOperation = 'source-over'; // Trở về bình thường

    particles.forEach(p => {
        p.update();
        p.draw();
    });

    flowers.forEach(f => {
        if (!f.isDummy) {
            f.update();
            f.draw();
        }
    });

    requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
